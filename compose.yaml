services:
  treedx-api:
    build:
      context: .
      target: dev
    working_dir: /workspace/treedx/apps/api
    command: sh -lc "mix deps.get && mix phx.server"
    environment:
      MIX_ENV: dev
      MIX_BUILD_PATH: /tmp/treedx-mix-build
      PHX_SERVER: "true"
      PHX_HOST: 0.0.0.0
      PORT: "4000"
      TREEDX_DATA_DIR: /var/lib/treedx
      TREEDX_AUTH_MODE: dev
      TREEDX_REGISTRY_MODE: local
      TREEDX_DEV_HOT_RELOAD: "true"
      TREEDX_NODE_ID: node_local
    ports:
      - "4000:4000"
    volumes:
      - .:/workspace/treedx
      - treedx-data:/var/lib/treedx
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/api/v1/health"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 20s

volumes:
  treedx-data:
