id: treedx
name: TreeDX
kind: beam-elixir-rust
type: image-service
repository: treeseed-ai/treedx
versionSource: apps/api/mix.exs
image: treeseed/treedx
workflowTemplateVersion: custom
deploymentSource:
  staging: git
  prod: image
releaseGate:
  workflow: .github/workflows/release-gate.yml
dockerImages:
  releaseWorkflow: release-gate.yml
  architectures:
    - amd64
    - arm64
artifacts:
  - provider: docker
    name: treeseed/treedx
    dockerfile: Dockerfile
    target: prod
    role: service
    architectures:
      - amd64
      - arm64
  - provider: docker
    name: treeseed/treedx-profiler
    dockerfile: Dockerfile.profiler
    target: profiler
    role: profiler
    architectures:
      - amd64
      - arm64
githubEnvironments:
  - staging
  - production
requiredSecrets:
  - DOCKERHUB_TOKEN
  - DOCKERHUB_USERNAME
  - NPM_TOKEN
  - PYPI_API_TOKEN
  - CARGO_REGISTRY_TOKEN
  - HEX_API_KEY
verify:
  fast: scripts/test-treedx-fast.sh
  local: scripts/test-all.sh
  release: scripts/release-gate.sh
projectArchitecture:
  topology: single_repository_site
  rootPath: .
  sitePath: docs
  contentPath: docs/src/content
  contentRuntimeSource: r2_published_manifest
  localContentMaterialization: existing_path
  contentPublishTarget:
    kind: cloudflare_r2
    prefix: packages/treedx
