services:
  treedx-api:
    build:
      context: .
      target: prod
    environment:
      PHX_SERVER: "true"
      PHX_HOST: 0.0.0.0
      PORT: "4000"
      TREEDX_DATA_DIR: /var/lib/treedx
      TREEDX_AUTH_MODE: connected
      TREEDX_REGISTRY_MODE: connected
      TREEDX_NODE_ID: node_local
    ports:
      - "4000:4000"
    volumes:
      - treedx-data:/var/lib/treedx
    restart: unless-stopped

volumes:
  treedx-data:
