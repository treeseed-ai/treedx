[package]
name = "treedx"
version = "0.2.15"
edition = "2024"
license = "Apache-2.0"
description = "Generic Rust SDK for TreeDX."
repository = "https://github.com/treeseed-ai/treedx"
readme = "README.md"
include = [
	"Cargo.toml",
	"README.md",
	"src/**/*.rs",
]

[workspace]

[lib]
name = "treedx"
path = "src/lib.rs"

[dependencies]
async-trait = "0.1"
bytes = "1"
reqwest = { version = "0.12", default-features = false, features = ["json", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
thiserror = "2"
url = "2"

[dev-dependencies]
serde_yaml = "0.9"
tokio = { version = "1", features = ["macros", "rt-multi-thread"] }
