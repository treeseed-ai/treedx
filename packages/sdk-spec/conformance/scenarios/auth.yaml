    expected: []
  steps:
  - name: execute
    action: auth.dev_token
    description: Execute auth.dev_token through the public SDK facade against the local TreeDX conformance harness.
  assertions:
  - The SDK dispatches the declared OpenAPI operation through its transport/auth/error stack.
  - Responses and TreeDX error envelopes are exposed without product-specific semantics.
