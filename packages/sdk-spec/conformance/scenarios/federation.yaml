    description: Run global context and graph operations through the SDK facade.
  assertions:
  - Global responses preserve reduced authorized scopes.
  - Context and graph outputs remain generic TreeDX data.
- id: federation.partial_failure
  capabilityId: federation.global_query
  title: Surface sanitized federated partial failures.
  kind: black_box
  required: true
  serverRequired: conditional
  endpointRefs:
  - POST /api/v1/query
  fixtures:
    repos: []
    requests: []
    expected: []
  steps:
  - name: partial_failure_query
    action: federation.query
    description: Run a federated query with a partial downstream failure.
  assertions:
  - Partial failures expose TreeDxApiError-compatible metadata when fatal.
  - Non-fatal partial failures are sanitized and do not expose hidden paths or credentials.
- id: federation.catalog
  capabilityId: federation.catalog_peers_routes
  title: Federation / Catalog
  kind: black_box
  required: true
  serverRequired: true
  endpointRefs: &id001
  - GET /api/v1/federation/catalog
  - POST /api/v1/federation/catalog/push
  - POST /api/v1/federation/catalog/sync
  - GET /api/v1/federation/peers
  - GET /api/v1/federation/peers/{node_id}
  - POST /api/v1/federation/nodes/register
  - POST /api/v1/federation/peers/{node_id}/trust
  - POST /api/v1/federation/peers/{node_id}/revoke
  - GET /api/v1/federation/routes
  fixtures:
    repos: []
    requests: []
    expected: []
  steps:
  - name: execute
    action: federation.catalog
    description: Execute federation.catalog through the public SDK facade against the local TreeDX conformance harness.
  assertions:
  - The SDK dispatches the declared OpenAPI operation through its transport/auth/error stack.
  - Responses and TreeDX error envelopes are exposed without product-specific semantics.
