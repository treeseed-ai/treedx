    fixtures:
      repos: []
      requests: []
      expected: []
    steps:
      - name: parse_context
        action: context.parse
        description: Parse context query input through the SDK facade.
    assertions:
      - Parse request stays generic and OpenAPI-aligned.
      - Parse result preserves server-owned diagnostics.
