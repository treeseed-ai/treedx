version: 0.1.0
status: draft
layers:
  generated:
    description: OpenAPI-generated or OpenAPI-validated schemas and low-level operation shapes.
    public: false
  core:
    description: Shared TreeDB SDK behavior across all public modules.
    public: partial
  facade:
    description: Idiomatic language-specific API built on the core layer.
    public: true
  conformance:
    description: Shared adapter surface for sdk-spec conformance scenarios.
    public: false
requiredModules:
- Client
- Auth
- Repositories
- Workspaces
- Files
- Blobs
- Query
- Graph
- Context
- Federation
- FederationInternal
- Registry
- Snapshots
- Artifacts
- Mirrors
- Migrations
- Exec
- Observability
- Admin
- Audit
- Policy
- SearchIndex
requiredPorts:
- transport
- auth_provider
- repository_adapter
- workspace_adapter
- file_adapter
- blob_adapter
- query_adapter
- graph_adapter
- context_adapter
- federation_adapter
- federation_internal_adapter
- registry_adapter
- snapshot_adapter
- artifact_adapter
- mirror_adapter
- migration_adapter
- exec_adapter
- admin_adapter
- audit_adapter
- policy_adapter
- search_index_adapter
requiredCoreConcepts:
- TreeDbClientConfig
- Transport
- AuthProvider
- TreeDbApiError
- TreeDbPage
- TreeDbCursor
- BinaryBody
- MultipartUpload
- CapabilityMatrix
- ConformanceAdapter
languageSdks:
- typescript
- python
- rust
- elixir
downstreamConsumers:
- package: packages/trsd-sdk
  role: TreeSeed integration reference and future TreeDB SDK consumer.
  architectureOwner: false
canonicalDirectories:
  generated: generated/
  core: core/
  facade: facade/
  conformance: conformance/
