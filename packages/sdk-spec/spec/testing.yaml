version: 0.1.0
status: draft

sharedTestRoots:
  - unit
  - adapters
  - generated
  - conformance
  - integration

optionalTestRoots:
  - compatibility

testRootPolicy:
  requiredStatusValues:
    - implemented
    - partial
    - planned
    - not_applicable
  compatibility:
    requiredForTreeDxLanguageSdks: false
    allowedForDownstreamConsumers: true
    description: Downstream product SDK migration safety only.

requiredTestCategories:
  unit:
    description: Pure SDK behavior with no server dependency.
    required: true
    serverRequired: false
    allowedToUseNetwork: false
    fixtureSource: package-local
    minimumExpectation: Validates client config, transport setup, auth helpers, errors, pagination, and binary helpers without a TreeDX server.
  adapters:
    description: Mocked transport request and response behavior.
    required: true
    serverRequired: false
    allowedToUseNetwork: false
    fixtureSource: mocked-transport
    minimumExpectation: Verifies each module adapter constructs OpenAPI-aligned method, path, headers, query, and body payloads.
  generated:
    description: OpenAPI type freshness, schema coverage, and exports.
    required: true
    serverRequired: false
    allowedToUseNetwork: false
    fixtureSource: docs/api/openapi.yaml
    minimumExpectation: Verifies generated or generated-like types stay aligned with docs/api/openapi.yaml and public SDK aliases.
  conformance:
    description: Shared scenarios through the SDK public API.
    required: true
    serverRequired: conditional
    allowedToUseNetwork: true
    fixtureSource: packages/sdk-spec/conformance
    minimumExpectation: Runs shared sdk-spec scenarios through the SDK public facade or reports not configured when no server is configured.
  integration:
    description: Real TreeDX server tests.
    required: true
    serverRequired: true
    allowedToUseNetwork: true
    fixtureSource: TreeDX test server
    minimumExpectation: Exercises live or local TreeDX API behavior and skips or reports not configured cleanly when credentials or server URL are absent.
  compatibility:
    description: Downstream product SDK migration safety, such as packages/trsd-sdk TreeSeed integration tests.
    required: false
    serverRequired: conditional
    allowedToUseNetwork: true
    fixtureSource: downstream package
    minimumExpectation: Must not define TreeDX SDK architecture and must remain downstream-consumer specific.

languageRoots:
  typescript: test
  python: tests
  rust: tests
  elixir: test

targetLayouts:
  typescript:
    package: packages/ts-sdk
    root: test
    requiredRoots:
      - test/unit
      - test/adapters
      - test/generated
      - test/conformance
      - test/integration
  python:
    package: packages/python-sdk
    root: tests
    requiredRoots:
      - tests/unit
      - tests/adapters
      - tests/generated
      - tests/conformance
      - tests/integration
  rust:
    package: packages/rust-sdk
    root: tests
    requiredRoots:
      - tests/unit
      - tests/adapters
      - tests/generated
      - tests/conformance
      - tests/integration
  elixir:
    package: packages/elixir-sdk
    root: test
    requiredRoots:
      - test/unit
      - test/adapters
      - test/generated
      - test/conformance
      - test/integration

manifestRequirements:
  testLayout:
    requiredRoots:
      - unit
      - adapters
      - generated
      - conformance
      - integration
    optionalRoots:
      - compatibility
    validStatuses:
      - implemented
      - partial
      - planned
      - not_applicable
  rules:
    - TreeDX language SDK manifests must declare every shared test root.
    - TreeDX language SDK manifests must not require compatibility.
    - Downstream consumers may declare compatibility when they consume TreeDX SDKs.
    - A test root marked implemented must exist in the SDK package.
    - A test root marked implemented must contain at least one source file or placeholder test marker.

rules:
  - TreeDX language SDKs must implement unit, adapters, generated, conformance, and integration categories.
  - TreeDX language SDKs share the same required test categories.
  - Downstream consumers such as packages/trsd-sdk may add compatibility tests.
  - Compatibility tests must not define the cross-language TreeDX SDK architecture.
  - Conformance scenarios must be sourced from packages/sdk-spec/conformance/scenarios.
  - Integration tests must skip or report not configured cleanly when live server credentials are absent.
