openapi: 3.1.0
info:
  title: TreeDB MVP API
  version: 0.10.0
  description: >
    Human-maintained Stage 0 public API route inventory for implemented TreeDB
    MVP surfaces. Schemas are intentionally generic until later contract stages.
servers:
  - url: http://localhost:4000
security:
  - bearerAuth: []
paths:
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Return basic service health.
      security: []
      x-treedb-required-capabilities: []
      x-treedb-stage: mvp
      responses: { "200": { $ref: "#/components/responses/Ok" } }
  /api/v1/version:
    get:
      operationId: getVersion
      summary: Return service and API version.
      security: []
      x-treedb-required-capabilities: []
      x-treedb-stage: mvp
      responses: { "200": { $ref: "#/components/responses/Ok" } }
  /api/v1/auth/whoami:
    get:
      operationId: getWhoami
      summary: Return the current principal when authenticated.
      security: []
      x-treedb-required-capabilities: []
      x-treedb-stage: mvp
      responses: { "200": { $ref: "#/components/responses/Ok" } }
  /api/v1/auth/mode:
    get:
      operationId: getAuthMode
      summary: Return the configured authentication mode.
      security: []
      x-treedb-required-capabilities: []
      x-treedb-stage: mvp
      responses: { "200": { $ref: "#/components/responses/Ok" } }
  /api/v1/auth/dev-token:
    post:
      operationId: createDevToken
      summary: Create a dev bearer token when dev auth is enabled.
      security: []
      x-treedb-required-capabilities: []
      x-treedb-stage: mvp
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "501": { $ref: "#/components/responses/Error" }
  /api/v1/policy/effective-scope:
    get:
      operationId: getEffectiveScope
      summary: Resolve the current effective policy scope.
      x-treedb-required-capabilities: [policy:read]
      x-treedb-stage: stage1-required
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/policy/refresh:
    post:
      operationId: refreshPolicy
      summary: Refresh local policy records from a connected policy source.
      x-treedb-required-capabilities: [policy:write]
      x-treedb-stage: stage1-required
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /api/v1/policy/capabilities:
    get:
      operationId: listCapabilities
      summary: List canonical TreeDB capabilities.
      x-treedb-required-capabilities: [policy:read]
      x-treedb-stage: mvp
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/policy/grants:
    get:
      operationId: listCapabilityGrants
      summary: List capability grants.
      x-treedb-required-capabilities: [policy:read]
      x-treedb-stage: mvp
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
    post:
      operationId: putCapabilityGrant
      summary: Create or replace a capability grant.
      x-treedb-required-capabilities: [policy:write]
      x-treedb-stage: mvp
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }
  /api/v1/audit/events:
    get:
      operationId: listAuditEvents
      summary: List audit events visible to the caller.
      x-treedb-required-capabilities: [audit:read]
      x-treedb-stage: mvp
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/federation/query/plan:
    post:
      operationId: planFederationQuery
      summary: Reduce a requested federated scope without executing a query.
      x-treedb-required-capabilities: [query:federated]
      x-treedb-stage: mvp
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/search:
    post:
      operationId: federatedSearch
      summary: Execute authorized federated repository search.
      x-treedb-required-capabilities: [query:federated, files:search]
      x-treedb-stage: stage4-required
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/TreeDbFederatedSearchRequest" } } } }
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" }, "502": { $ref: "#/components/responses/Error" } }
  /api/v1/query:
    post:
      operationId: federatedQuery
      summary: Execute authorized federated repository query.
      x-treedb-required-capabilities: [query:federated]
      x-treedb-stage: stage4-required
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/TreeDbFederatedQueryRequest" } } } }
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" }, "502": { $ref: "#/components/responses/Error" } }
  /api/v1/context/build:
    post:
      operationId: federatedContextBuild
      summary: Build an authorized federated context pack.
      x-treedb-required-capabilities: [query:federated, graph:query]
      x-treedb-stage: stage4-required
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/TreeDbFederatedContextRequest" } } } }
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" }, "502": { $ref: "#/components/responses/Error" } }
  /api/v1/graph/query:
    post:
      operationId: federatedGraphQuery
      summary: Execute an authorized federated graph query.
      x-treedb-required-capabilities: [query:federated, graph:query]
      x-treedb-stage: stage4-required
      requestBody: { content: { application/json: { schema: { $ref: "#/components/schemas/TreeDbFederatedGraphRequest" } } } }
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" }, "502": { $ref: "#/components/responses/Error" } }
  /api/v1/node:
    get:
      operationId: getLocalNode
      summary: Return local node metadata.
      x-treedb-required-capabilities: [registry:read]
      x-treedb-stage: mvp
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/registry/nodes:
    get:
      operationId: listRegistryNodes
      summary: List registered TreeDB nodes.
      x-treedb-required-capabilities: [registry:read]
      x-treedb-stage: mvp
      responses:
        "200": { $ref: "#/components/responses/Ok" }
        "401": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
  /api/v1/registry/repos/{repo_id}/placement:
    get:
      operationId: getRepositoryPlacement
      summary: Return placement metadata for a repository.
      x-treedb-required-capabilities: [registry:read]
      x-treedb-stage: mvp
      parameters: [ { $ref: "#/components/parameters/RepoId" } ]
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "404": { $ref: "#/components/responses/Error" } }
    post:
      operationId: putRepositoryPlacement
      summary: Create or update placement metadata for a repository.
      x-treedb-required-capabilities: [registry:write]
      x-treedb-stage: mvp
      parameters: [ { $ref: "#/components/parameters/RepoId" } ]
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" } }
  /api/v1/repos/register:
    post:
      operationId: registerRepository
      summary: Register a repository.
      x-treedb-required-capabilities: [repos:write]
      x-treedb-stage: mvp
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" } }
  /api/v1/repos:
    get:
      operationId: listRepositories
      summary: List repositories visible to the caller.
      x-treedb-required-capabilities: [repos:read]
      x-treedb-stage: stage1-required
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } }
  /api/v1/repos/{repo_id}:
    get:
      operationId: getRepository
      summary: Return repository metadata.
      x-treedb-required-capabilities: [repos:read]
      x-treedb-stage: mvp
      parameters: [ { $ref: "#/components/parameters/RepoId" } ]
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "404": { $ref: "#/components/responses/Error" } }
  /api/v1/repos/{repo_id}/status:
    get:
      operationId: getRepositoryStatus
      summary: Return repository status.
      x-treedb-required-capabilities: [repos:read]
      x-treedb-stage: mvp
      parameters: [ { $ref: "#/components/parameters/RepoId" } ]
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "404": { $ref: "#/components/responses/Error" } }
  /api/v1/repos/{repo_id}/refs:
    get:
      operationId: listRepositoryRefs
      summary: List repository refs.
      x-treedb-required-capabilities: [git:read]
      x-treedb-stage: stage1-required
      parameters: [ { $ref: "#/components/parameters/RepoId" } ]
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } }
  /api/v1/repos/{repo_id}/remotes:
    get:
      operationId: listRepositoryRemotes
      summary: List repository remotes.
      x-treedb-required-capabilities: [remotes:read]
      x-treedb-stage: stage1-required
      parameters: [ { $ref: "#/components/parameters/RepoId" } ]
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } }
  /api/v1/repos/{repo_id}/sync:
    post:
      operationId: syncRepository
      summary: Fetch repository updates.
      x-treedb-required-capabilities: [git:fetch]
      x-treedb-stage: stage3-required
      parameters: [ { $ref: "#/components/parameters/RepoId" } ]
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" } }
  /api/v1/repos/{repo_id}/push:
    post:
      operationId: pushRepository
      summary: Push explicit repository refs to a remote.
      x-treedb-required-capabilities: [git:push]
      x-treedb-stage: stage3-required
      parameters: [ { $ref: "#/components/parameters/RepoId" } ]
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "409": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" } }
  /api/v1/repos/{repo_id}/workspaces:
    post:
      operationId: createWorkspace
      summary: Create a repository workspace.
      x-treedb-required-capabilities: [workspace:create]
      x-treedb-stage: stage1-required
      parameters: [ { $ref: "#/components/parameters/RepoId" } ]
      responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "409": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" } }
  /api/v1/repos/{repo_id}/files/read:
    post: { operationId: readRepositoryFile, summary: Read a repository file, x-treedb-required-capabilities: [files:read], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "404": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/blobs/read:
    post: { operationId: readRepositoryBlob, summary: Read a repository blob as base64, x-treedb-required-capabilities: [files:read], x-treedb-stage: stage2-required, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "404": { $ref: "#/components/responses/Error" }, "409": { $ref: "#/components/responses/Error" }, "413": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/files/search:
    post: { operationId: searchRepositoryFiles, summary: Search repository files, x-treedb-required-capabilities: [files:search], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/paths/list:
    post: { operationId: listRepositoryPaths, summary: List repository paths, x-treedb-required-capabilities: [files:read], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/query:
    post: { operationId: queryRepository, summary: Query repository content, x-treedb-required-capabilities: [files:search], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/graph/refresh:
    post: { operationId: refreshRepositoryGraph, summary: Refresh repository graph, x-treedb-required-capabilities: [graph:refresh], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/graph/query:
    post: { operationId: queryRepositoryGraph, summary: Query repository graph, x-treedb-required-capabilities: [graph:query], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "404": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/graph/search-files:
    post: { operationId: searchGraphFiles, summary: Search graph files, x-treedb-required-capabilities: [graph:query], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/graph/search-sections:
    post: { operationId: searchGraphSections, summary: Search graph sections, x-treedb-required-capabilities: [graph:query], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/graph/search-entities:
    post: { operationId: searchGraphEntities, summary: Search graph entities, x-treedb-required-capabilities: [graph:query], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/graph/nodes/{node_id}:
    get: { operationId: getGraphNode, summary: Get one graph node, x-treedb-required-capabilities: [graph:query], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" }, { name: node_id, in: path, required: true, schema: { type: string } } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "404": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/graph/related:
    post: { operationId: getRelatedGraphNodes, summary: Get related graph nodes, x-treedb-required-capabilities: [graph:query], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/graph/subgraph:
    post: { operationId: getGraphSubgraph, summary: Get a graph subgraph, x-treedb-required-capabilities: [graph:query], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/context/build:
    post: { operationId: buildContext, summary: Build a context pack, x-treedb-required-capabilities: [graph:query], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/context/parse-ctx:
    post: { operationId: parseContextQuery, summary: Parse a context query DSL string, x-treedb-required-capabilities: [graph:query], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/snapshots/build:
    post: { operationId: buildSnapshot, summary: Build a repository snapshot, x-treedb-required-capabilities: [snapshot:build], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/snapshots/{snapshot_id}:
    get: { operationId: getSnapshot, summary: Get snapshot metadata, x-treedb-required-capabilities: [snapshot:build], x-treedb-stage: stage1-required, parameters: [ { $ref: "#/components/parameters/RepoId" }, { name: snapshot_id, in: path, required: true, schema: { type: string } } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "404": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/artifacts/export:
    post: { operationId: exportArtifact, summary: Export snapshot artifact metadata or bytes, x-treedb-required-capabilities: [artifact:export], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "404": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/mirrors:
    get: { operationId: listMirrors, summary: List repository mirrors, x-treedb-required-capabilities: [mirror:read], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" } } }
    post: { operationId: putMirror, summary: Create or update a repository mirror, x-treedb-required-capabilities: [mirror:write], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/mirrors/{mirror_id}/sync:
    post: { operationId: syncMirror, summary: Record or execute mirror sync, x-treedb-required-capabilities: [mirror:write, git:fetch], x-treedb-stage: mvp, parameters: [ { $ref: "#/components/parameters/RepoId" }, { name: mirror_id, in: path, required: true, schema: { type: string } } ], responses: { "200": { $ref: "#/components/responses/Ok" }, "401": { $ref: "#/components/responses/Error" }, "403": { $ref: "#/components/responses/Error" }, "422": { $ref: "#/components/responses/Error" } } }
  /api/v1/repos/{repo_id}/mirrors/{mirror_id}/health:
