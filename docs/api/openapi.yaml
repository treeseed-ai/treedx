components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    RepoId:
      name: repo_id
      in: path
      required: true
      schema: { type: string }
    WorkspaceId:
      name: workspace_id
      in: path
      required: true
      schema: { type: string }
  responses:
    Ok:
      description: TreeDB ok envelope.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/OkEnvelope" }
    Error:
      description: TreeDB error envelope.
      content:
        application/json:
          schema: { $ref: "#/components/schemas/ErrorEnvelope" }
  schemas:
    OkEnvelope:
      type: object
      required: [ok]
      properties:
        ok: { const: true }
      additionalProperties: true
    ErrorEnvelope:
      type: object
      required: [ok, error]
      properties:
        ok: { const: false }
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string }
            message: { type: string }
            details: { type: object }
    Principal: { type: object, additionalProperties: true }
    EffectiveScope: { type: object, additionalProperties: true }
    Repository: { type: object, additionalProperties: true }
    Workspace: { type: object, additionalProperties: true }
    TreeDbFederatedDiagnostics: { type: object, additionalProperties: true }
    TreeDbFederatedError: { type: object, additionalProperties: true }
    TreeDbFederatedSearchRequest: { type: object, required: [repoIds, query], additionalProperties: true }
    TreeDbFederatedSearchResponse: { type: object, additionalProperties: true }
    TreeDbFederatedQueryRequest: { type: object, required: [repoIds, type], additionalProperties: true }
    TreeDbFederatedQueryResponse: { type: object, additionalProperties: true }
    TreeDbFederatedContextRequest: { type: object, required: [repoIds], additionalProperties: true }
    TreeDbFederatedContextResponse: { type: object, additionalProperties: true }
    TreeDbFederatedGraphRequest: { type: object, required: [repoIds], additionalProperties: true }
    TreeDbFederatedGraphResponse: { type: object, additionalProperties: true }
