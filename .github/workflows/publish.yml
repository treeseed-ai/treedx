name: Publish Image TreeDX

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
      packages: write
    environment: production
    strategy:
      matrix:
        include:
          - image: treeseed/treedx
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: treeseed/treedx
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - run: npm ci --ignore-scripts || (echo "dependency install failed; retrying" && npm ci --ignore-scripts)
      - name: Compute image tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "base=${version}" >> "$GITHUB_OUTPUT"
          echo "moving=" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ matrix.image }}:${{ steps.tags.outputs.base }}-${{ matrix.arch }}

  manifest:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    environment: production
    strategy:
      matrix:
        include:
          - image: treeseed/treedx
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Compute image tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "base=${version}" >> "$GITHUB_OUTPUT"
          echo "moving=" >> "$GITHUB_OUTPUT"
      - name: Publish multi-architecture manifest
        run: |
          docker buildx imagetools create \
            -t "${{ matrix.image }}:${{ steps.tags.outputs.base }}" \
            "${{ matrix.image }}:${{ steps.tags.outputs.base }}-amd64" \
            "${{ matrix.image }}:${{ steps.tags.outputs.base }}-arm64"
  release:
    needs: manifest
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
