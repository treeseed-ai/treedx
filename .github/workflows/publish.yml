name: Publish Image TreeDX

on:
  workflow_dispatch:
  push:
    tags:
      - "*.*.*"

jobs:
  npm-sdk:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: production
    defaults:
      run:
        working-directory: packages/ts-sdk
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run treedx:check-generated
      - run: npm run build
      - run: npm test
      - run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  python-sdk:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    environment: production
    defaults:
      run:
        working-directory: packages/python-sdk
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[dev]" twine
      - run: python scripts/check_treedx_generated_types.py
      - run: python -m build
      - run: python -m pytest
      - run: python -m twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  rust-sdk:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    environment: production
    defaults:
      run:
        working-directory: packages/rust-sdk
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npm ci
        working-directory: packages/sdk-spec
      - run: ../sdk-spec/node_modules/.bin/tsx scripts/check_treedx_generated_types.ts
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets -- -D warnings
      - run: cargo test
      - run: cargo publish --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  elixir-sdk:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    environment: production
    defaults:
      run:
        working-directory: packages/elixir-sdk
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: erlef/setup-beam@v1
        with:
          otp-version: "27"
          elixir-version: "1.17.3"
      - run: mix local.hex --force && mix local.rebar --force
      - run: mix deps.get
      - run: mix run scripts/check_treedx_generated_types.exs
      - run: mix format --check-formatted
      - run: mix test
      - run: mix hex.publish --yes
        env:
          HEX_API_KEY: ${{ secrets.HEX_API_KEY }}

  build:
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
      packages: write
    environment: production
    strategy:
      matrix:
        include:
          - image: treeseed/treedx
            dockerfile: Dockerfile
            target: prod
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: treeseed/treedx
            dockerfile: Dockerfile
            target: prod
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
          - image: treeseed/treedx-profiler
            dockerfile: Dockerfile.profiler
            target: profiler
            arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - image: treeseed/treedx-profiler
            dockerfile: Dockerfile.profiler
            target: profiler
            arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Compute image tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "base=${version}" >> "$GITHUB_OUTPUT"
          echo "moving=" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.TREESEED_DOCKERHUB_USERNAME }}
          password: ${{ secrets.TREESEED_DOCKERHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ matrix.platform }}
          push: true
          sbom: true
          provenance: mode=max
          tags: ${{ matrix.image }}:${{ steps.tags.outputs.base }}-${{ matrix.arch }}

  manifest:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    environment: production
    strategy:
      matrix:
        include:
          - image: treeseed/treedx
          - image: treeseed/treedx-profiler
    steps:
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ vars.TREESEED_DOCKERHUB_USERNAME }}
          password: ${{ secrets.TREESEED_DOCKERHUB_TOKEN }}
      - name: Compute image tags
        id: tags
        run: |
          version="${GITHUB_REF_NAME#v}"
          echo "base=${version}" >> "$GITHUB_OUTPUT"
          echo "moving=" >> "$GITHUB_OUTPUT"
      - name: Publish multi-architecture manifest
        run: |
          docker buildx imagetools create \
            -t "${{ matrix.image }}:${{ steps.tags.outputs.base }}" \
            "${{ matrix.image }}:${{ steps.tags.outputs.base }}-amd64" \
            "${{ matrix.image }}:${{ steps.tags.outputs.base }}-arm64"

  release:
    needs:
      - manifest
      - npm-sdk
      - python-sdk
      - rust-sdk
      - elixir-sdk
    if: startsWith(github.ref, 'refs/tags/') && !contains(github.ref_name, '-')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "${GITHUB_REF_NAME}" --generate-notes --verify-tag
