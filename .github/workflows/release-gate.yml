name: TreeDB Release Gate

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - '*'

env:
  CARGO_TARGET_DIR: /tmp/treedb-target
  RUSTLER_TARGET_DIR: /tmp/treedb-target
  MIX_ENV: test
  CARGO_TERM_COLOR: always
  TREEDB_LIVE_NODE_A_URL: ${{ secrets.TREEDB_LIVE_NODE_A_URL }}
  TREEDB_LIVE_NODE_A_TOKEN: ${{ secrets.TREEDB_LIVE_NODE_A_TOKEN }}
  TREEDB_LIVE_NODE_A_REPO_ID: ${{ secrets.TREEDB_LIVE_NODE_A_REPO_ID }}
  TREEDB_LIVE_NODE_B_URL: ${{ secrets.TREEDB_LIVE_NODE_B_URL }}
  TREEDB_LIVE_NODE_B_TOKEN: ${{ secrets.TREEDB_LIVE_NODE_B_TOKEN }}
  TREEDB_LIVE_NODE_B_REPO_ID: ${{ secrets.TREEDB_LIVE_NODE_B_REPO_ID }}

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    name: Verify (${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            jq \
            libssl-dev \
            openssl \
            pkg-config \
            zstd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: /tmp/treedb-target
          key: ${{ runner.os }}-${{ matrix.arch }}-treedb-rust-${{ hashFiles('Cargo.lock', 'apps/api/native/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-treedb-rust-

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        env:
          ImageOS: ubuntu24
        with:
          otp-version: '27'
          elixir-version: '1.17'

      - name: Install scanner tools
        run: |
          cargo install cargo-audit --locked
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run release gate
        run: ./scripts/release-gate.sh

  profile:
    needs: verify
    if: >-
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/staging' ||
        startsWith(github.ref, 'refs/tags/')
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    name: Profile (${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run architecture profile
        shell: bash
        env:
          TREEDB_CI_PROFILE_MODE: ${{ vars.TREEDB_CI_PROFILE_MODE }}
          TREEDB_PROFILE_DURATION: ${{ vars.TREEDB_CI_PROFILE_DURATION }}
          TREEDB_PROFILE_CONCURRENCY: ${{ vars.TREEDB_CI_PROFILE_CONCURRENCY }}
          TREEDB_PROFILE_SIZE: ${{ vars.TREEDB_CI_PROFILE_SIZE }}
          TREEDB_PROFILE_FIXTURE: ${{ vars.TREEDB_CI_PROFILE_FIXTURE }}
          TREEDB_PROFILE_SCENARIO: ${{ vars.TREEDB_CI_PROFILE_SCENARIO }}
          TREEDB_PROFILE_LOAD_MODE: ${{ vars.TREEDB_CI_PROFILE_LOAD_MODE }}
          TREEDB_PROFILE_ITERATIONS: ${{ vars.TREEDB_CI_PROFILE_ITERATIONS }}
        run: |
          set -euo pipefail

          mode="${TREEDB_CI_PROFILE_MODE:-portfolio}"
          export TREEDB_PROFILE_DURATION="${TREEDB_PROFILE_DURATION:-2m}"
          export TREEDB_PROFILE_CONCURRENCY="${TREEDB_PROFILE_CONCURRENCY:-25}"
          export TREEDB_PROFILE_OUTPUT="target/profiles/ci-${mode}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}.yaml"
          export TREEDB_PROFILE_MARKDOWN_OUTPUT="target/profiles/ci-${mode}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}.md"
          export TREEDB_PROFILE_REPORT_FORMAT="both"

          ./scripts/profile-compose.sh "${mode}"

      - name: Upload profile reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: treedb-profile-${{ matrix.arch }}
          path: target/profiles/ci-*-${{ matrix.arch }}.*
          if-no-files-found: ignore

  publish-plan:
    runs-on: ubuntu-latest
    needs: verify
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.docker_tag.outputs.image_tag }}
      arch_image_prefix: ${{ steps.docker_tag.outputs.arch_image_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker tag
        id: docker_tag
        shell: bash
        run: |
          set -euo pipefail

          semver='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$'

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ "$tag" == v* ]]; then
              echo "Release tags must be semantic versions without a v prefix." >&2
              exit 1
            fi
            if [[ "$tag" == *+* ]]; then
              echo "Release tags with build metadata cannot be published as exact Docker tags." >&2
              exit 1
            fi
            if [[ ! "$tag" =~ $semver ]]; then
              echo "Release tag '$tag' is not a supported semantic version." >&2
              exit 1
            fi
            if docker buildx imagetools inspect "treeseed/treedb:${tag}" >/dev/null 2>&1; then
              echo "Docker image treeseed/treedb:${tag} already exists." >&2
              exit 1
            fi
            image_tag="treeseed/treedb:${tag}"
          else
            image_tag="treeseed/treedb:latest"
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "arch_image_prefix=${image_tag}" >> "$GITHUB_OUTPUT"

  build-publish-image:
    needs:
      - publish-plan
      - profile
    if: >-
      needs.publish-plan.result == 'success' &&
      needs.profile.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ needs.publish-plan.outputs.arch_image_prefix }}-${{ matrix.arch }}
          cache-from: type=gha,scope=treedb-prod-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=treedb-prod-${{ matrix.arch }}

  publish:
    needs:
      - publish-plan
      - build-publish-image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Docker manifest
        shell: bash
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            -t "${{ needs.publish-plan.outputs.image_tag }}" \
            "${{ needs.publish-plan.outputs.arch_image_prefix }}-amd64" \
            "${{ needs.publish-plan.outputs.arch_image_prefix }}-arm64"

          docker buildx imagetools inspect "${{ needs.publish-plan.outputs.image_tag }}"
