name: TreeDB Release Gate

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - '*'

env:
  CARGO_TARGET_DIR: /tmp/treedb-target
  RUSTLER_TARGET_DIR: /tmp/treedb-target
  MIX_ENV: test
  CARGO_TERM_COLOR: always
  TREEDB_LIVE_NODE_A_URL: ${{ secrets.TREEDB_LIVE_NODE_A_URL }}
  TREEDB_LIVE_NODE_A_TOKEN: ${{ secrets.TREEDB_LIVE_NODE_A_TOKEN }}
  TREEDB_LIVE_NODE_A_REPO_ID: ${{ secrets.TREEDB_LIVE_NODE_A_REPO_ID }}
  TREEDB_LIVE_NODE_B_URL: ${{ secrets.TREEDB_LIVE_NODE_B_URL }}
  TREEDB_LIVE_NODE_B_TOKEN: ${{ secrets.TREEDB_LIVE_NODE_B_TOKEN }}
  TREEDB_LIVE_NODE_B_REPO_ID: ${{ secrets.TREEDB_LIVE_NODE_B_REPO_ID }}

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            jq \
            libssl-dev \
            openssl \
            pkg-config \
            zstd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: /tmp/treedb-target
          key: ${{ runner.os }}-treedb-rust-${{ hashFiles('Cargo.lock', 'apps/api/native/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-treedb-rust-

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.17'

      - name: Install scanner tools
        run: |
          cargo install cargo-audit --locked
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run release gate
        run: ./scripts/release-gate.sh

  publish:
    runs-on: ubuntu-latest
    needs: verify
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker tag
        id: docker_tag
        shell: bash
        run: |
          set -euo pipefail

          semver='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$'

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ "$tag" == v* ]]; then
              echo "Release tags must be semantic versions without a v prefix." >&2
              exit 1
            fi
            if [[ "$tag" == *+* ]]; then
              echo "Release tags with build metadata cannot be published as exact Docker tags." >&2
              exit 1
            fi
            if [[ ! "$tag" =~ $semver ]]; then
              echo "Release tag '$tag' is not a supported semantic version." >&2
              exit 1
            fi
            if docker buildx imagetools inspect "treeseed/treedb:${tag}" >/dev/null 2>&1; then
              echo "Docker image treeseed/treedb:${tag} already exists." >&2
              exit 1
            fi
            echo "tags=treeseed/treedb:${tag}" >> "$GITHUB_OUTPUT"
          else
            echo "tags=treeseed/treedb:latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker_tag.outputs.tags }}
