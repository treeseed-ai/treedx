name: TreeDB Release Gate

on:
  pull_request:
  push:
    branches:
      - '**'
    tags:
      - '*'

env:
  CARGO_TARGET_DIR: /tmp/treedb-target
  RUSTLER_TARGET_DIR: /tmp/treedb-target
  MIX_ENV: test
  CARGO_TERM_COLOR: always
  TREEDB_LIVE_NODE_A_URL: ${{ secrets.TREEDB_LIVE_NODE_A_URL }}
  TREEDB_LIVE_NODE_A_TOKEN: ${{ secrets.TREEDB_LIVE_NODE_A_TOKEN }}
  TREEDB_LIVE_NODE_A_REPO_ID: ${{ secrets.TREEDB_LIVE_NODE_A_REPO_ID }}
  TREEDB_LIVE_NODE_B_URL: ${{ secrets.TREEDB_LIVE_NODE_B_URL }}
  TREEDB_LIVE_NODE_B_TOKEN: ${{ secrets.TREEDB_LIVE_NODE_B_TOKEN }}
  TREEDB_LIVE_NODE_B_REPO_ID: ${{ secrets.TREEDB_LIVE_NODE_B_REPO_ID }}

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            jq \
            libssl-dev \
            openssl \
            pkg-config \
            zstd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: /tmp/treedb-target
          key: ${{ runner.os }}-treedb-rust-${{ hashFiles('Cargo.lock', 'apps/api/native/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-treedb-rust-

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: '27'
          elixir-version: '1.17'

      - name: Install scanner tools
        run: |
          cargo install cargo-audit --locked
          curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin
          curl -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin

      - name: Run release gate
        run: ./scripts/release-gate.sh

  publish-plan:
    runs-on: ubuntu-latest
    needs: verify
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.docker_tag.outputs.image_tag }}
      temp_prefix: ${{ steps.docker_tag.outputs.temp_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker tag
        id: docker_tag
        shell: bash
        run: |
          set -euo pipefail

          semver='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$'

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ "$tag" == v* ]]; then
              echo "Release tags must be semantic versions without a v prefix." >&2
              exit 1
            fi
            if [[ "$tag" == *+* ]]; then
              echo "Release tags with build metadata cannot be published as exact Docker tags." >&2
              exit 1
            fi
            if [[ ! "$tag" =~ $semver ]]; then
              echo "Release tag '$tag' is not a supported semantic version." >&2
              exit 1
            fi
            if docker buildx imagetools inspect "treeseed/treedb:${tag}" >/dev/null 2>&1; then
              echo "Docker image treeseed/treedb:${tag} already exists." >&2
              exit 1
            fi
            echo "image_tag=treeseed/treedb:${tag}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=treeseed/treedb:latest" >> "$GITHUB_OUTPUT"
          fi

          echo "temp_prefix=treeseed/treedb:ci-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" >> "$GITHUB_OUTPUT"

  build-publish-image:
    needs: publish-plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ needs.publish-plan.outputs.temp_prefix }}-${{ matrix.arch }}
          cache-from: type=gha,scope=treedb-prod-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=treedb-prod-${{ matrix.arch }}

  publish:
    needs:
      - publish-plan
      - build-publish-image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Docker manifest
        shell: bash
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            -t "${{ needs.publish-plan.outputs.image_tag }}" \
            "${{ needs.publish-plan.outputs.temp_prefix }}-amd64" \
            "${{ needs.publish-plan.outputs.temp_prefix }}-arm64"

          docker buildx imagetools inspect "${{ needs.publish-plan.outputs.image_tag }}"
