name: TreeDB Release Gate

on:
  workflow_dispatch:
    inputs:
      performance_profile:
        description: Run optional 100 RPS performance profile
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"
  pull_request:
    paths:
      - "apps/api/**"
      - "apps/api/native/**"
      - "config/**"
      - "lib/**"
      - "test/**"
      - "native/**"
      - "profiles/**"
      - "tools/treedb_profiler/**"
      - "scripts/release-gate.sh"
      - "scripts/test-all.sh"
      - "scripts/test-treedb-fast.sh"
      - "scripts/openapi-check.sh"
      - "scripts/storage-recovery-check.sh"
      - "scripts/security-check.sh"
      - "scripts/mvp-smoke.sh"
      - "scripts/federation-live-check.sh"
      - "scripts/profile-compose.sh"
      - "scripts/profile-treedb.sh"
      - "scripts/profile-treedb-smoke.sh"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "compose*.yml"
      - "mix.exs"
      - "mix.lock"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/api/mix.exs"
      - "apps/api/mix.lock"
      - "docs/api/openapi.yaml"
      - "docs/api/openapi.json"
      - ".github/workflows/release-gate.yml"
  push:
    branches:
      - "**"
    tags:
      - "*"
    paths:
      - "apps/api/**"
      - "apps/api/native/**"
      - "config/**"
      - "lib/**"
      - "test/**"
      - "native/**"
      - "profiles/**"
      - "tools/treedb_profiler/**"
      - "scripts/release-gate.sh"
      - "scripts/test-all.sh"
      - "scripts/test-treedb-fast.sh"
      - "scripts/openapi-check.sh"
      - "scripts/storage-recovery-check.sh"
      - "scripts/security-check.sh"
      - "scripts/mvp-smoke.sh"
      - "scripts/federation-live-check.sh"
      - "scripts/profile-compose.sh"
      - "scripts/profile-treedb.sh"
      - "scripts/profile-treedb-smoke.sh"
      - "Dockerfile"
      - "docker-compose*.yml"
      - "compose*.yml"
      - "mix.exs"
      - "mix.lock"
      - "Cargo.toml"
      - "Cargo.lock"
      - "apps/api/mix.exs"
      - "apps/api/mix.lock"
      - "docs/api/openapi.yaml"
      - "docs/api/openapi.json"
      - ".github/workflows/release-gate.yml"

env:
  CARGO_TARGET_DIR: /tmp/treedb-target
  RUSTLER_TARGET_DIR: /tmp/treedb-target
  MIX_ENV: test
  CARGO_TERM_COLOR: always
  CARGO_HTTP_MULTIPLEXING: false
  CARGO_NET_RETRY: 10
  TREEDB_LIVE_NODE_A_URL: ${{ secrets.TREEDB_LIVE_NODE_A_URL }}
  TREEDB_LIVE_NODE_A_TOKEN: ${{ secrets.TREEDB_LIVE_NODE_A_TOKEN }}
  TREEDB_LIVE_NODE_A_REPO_ID: ${{ secrets.TREEDB_LIVE_NODE_A_REPO_ID }}
  TREEDB_LIVE_NODE_B_URL: ${{ secrets.TREEDB_LIVE_NODE_B_URL }}
  TREEDB_LIVE_NODE_B_TOKEN: ${{ secrets.TREEDB_LIVE_NODE_B_TOKEN }}
  TREEDB_LIVE_NODE_B_REPO_ID: ${{ secrets.TREEDB_LIVE_NODE_B_REPO_ID }}

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    name: Verify (${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            ca-certificates \
            curl \
            git \
            jq \
            libssl-dev \
            openssl \
            pkg-config \
            zstd

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust target
        uses: actions/cache@v4
        with:
          path: /tmp/treedb-target
          key: ${{ runner.os }}-${{ matrix.arch }}-treedb-rust-${{ hashFiles('Cargo.lock', 'apps/api/native/**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-treedb-rust-

      - name: Cache Cargo registry and tools
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-audit
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-${{ matrix.arch }}-treedb-cargo-tools-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-treedb-cargo-tools-

      - name: Setup Elixir
        uses: erlef/setup-beam@v1
        env:
          ImageOS: ubuntu24
        with:
          otp-version: "27"
          elixir-version: "1.17"

      - name: Install scanner tools
        shell: bash
        run: |
          set -euo pipefail

          retry() {
            local attempt
            for attempt in 1 2 3 4 5; do
              if "$@"; then
                return 0
              fi
              if [[ "$attempt" == "5" ]]; then
                return 1
              fi
              sleep $((attempt * 5))
            done
          }

          if ! command -v cargo-audit >/dev/null 2>&1; then
            retry cargo install cargo-audit --locked
          fi

          retry bash -c 'curl --http1.1 -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sudo sh -s -- -b /usr/local/bin'
          retry bash -c 'curl --http1.1 -sSfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sudo sh -s -- -b /usr/local/bin'

      - name: Run release gate
        run: ./scripts/release-gate.sh

  profile:
    needs: verify
    if: >-
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/staging' ||
        startsWith(github.ref, 'refs/tags/')
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    name: Profile (${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run architecture profile
        shell: bash
        env:
          TREEDB_CI_PROFILE_MODE: ${{ vars.TREEDB_CI_PROFILE_MODE }}
          TREEDB_PROFILE_DURATION: ${{ vars.TREEDB_CI_PROFILE_DURATION }}
          TREEDB_PROFILE_CONCURRENCY: ${{ vars.TREEDB_CI_PROFILE_CONCURRENCY }}
          TREEDB_PROFILE_SIZE: ${{ vars.TREEDB_CI_PROFILE_SIZE }}
          TREEDB_PROFILE_FIXTURE: ${{ vars.TREEDB_CI_PROFILE_FIXTURE }}
          TREEDB_PROFILE_SCENARIO: ${{ vars.TREEDB_CI_PROFILE_SCENARIO }}
          TREEDB_PROFILE_LOAD_MODE: ${{ vars.TREEDB_CI_PROFILE_LOAD_MODE }}
          TREEDB_PROFILE_ITERATIONS: ${{ vars.TREEDB_CI_PROFILE_ITERATIONS }}
          TREEDB_PROFILE_RELIABILITY_VERIFIER: ${{ vars.TREEDB_CI_PROFILE_RELIABILITY_VERIFIER }}
          TREEDB_PROFILE_DURATION_IS_CONTROLLING: ${{ vars.TREEDB_CI_PROFILE_DURATION_IS_CONTROLLING }}
          TREEDB_PROFILE_MINIMUM_MEASURED_DURATION: ${{ vars.TREEDB_CI_PROFILE_MINIMUM_MEASURED_DURATION }}
        run: |
          set -euo pipefail

          mkdir -p target/profiles

          mode="${TREEDB_CI_PROFILE_MODE:-portfolio}"
          export TREEDB_PROFILE_DURATION="${TREEDB_PROFILE_DURATION:-10m}"
          export TREEDB_PROFILE_ITERATIONS="${TREEDB_PROFILE_ITERATIONS:-}"
          export TREEDB_PROFILE_RELIABILITY_VERIFIER="${TREEDB_PROFILE_RELIABILITY_VERIFIER:-true}"
          export TREEDB_PROFILE_DURATION_IS_CONTROLLING="${TREEDB_PROFILE_DURATION_IS_CONTROLLING:-true}"
          export TREEDB_PROFILE_MINIMUM_MEASURED_DURATION="${TREEDB_PROFILE_MINIMUM_MEASURED_DURATION:-10m}"
          export TREEDB_PROFILE_CONCURRENCY="${TREEDB_PROFILE_CONCURRENCY:-25}"
          export TREEDB_PROFILE_OUTPUT="target/profiles/ci-${mode}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}.yaml"
          export TREEDB_PROFILE_MARKDOWN_OUTPUT="target/profiles/ci-${mode}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}.md"
          export TREEDB_PROFILE_REPLAY_LOG="target/profiles/ci-${mode}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}-replay.jsonl"
          export TREEDB_PROFILE_FAILURE_REPLAY_LOG="target/profiles/ci-${mode}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}-failures.jsonl"
          export TREEDB_PROFILE_REPORT_FORMAT="both"

          ./scripts/profile-compose.sh "${mode}"

      - name: Capture compose logs
        if: failure()
        shell: bash
        run: |
          mkdir -p target/profiles
          docker compose logs --no-color > "target/profiles/profile-compose-${{ matrix.arch }}.log" 2>&1 || true

      - name: Upload profile reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: treedb-profile-${{ matrix.arch }}
          path: |
            target/profiles/ci-*.yaml
            target/profiles/ci-*.md
            target/profiles/ci-*-replay.jsonl
            target/profiles/ci-*-failures.jsonl
            target/profiles/*.log
          if-no-files-found: ignore

  profile-federation:
    needs: verify
    if: >-
      github.event_name == 'push' &&
      (
        github.ref == 'refs/heads/main' ||
        github.ref == 'refs/heads/staging' ||
        startsWith(github.ref, 'refs/tags/')
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
            mode: mirror-federation
          - arch: amd64
            runner: ubuntu-24.04
            mode: connected-library
          - arch: arm64
            runner: ubuntu-24.04-arm
            mode: mirror-federation
          - arch: arm64
            runner: ubuntu-24.04-arm
            mode: connected-library
    runs-on: ${{ matrix.runner }}
    name: Federation Profile (${{ matrix.arch }}, ${{ matrix.mode }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run federation profile
        shell: bash
        env:
          TREEDB_CI_FEDERATION_PROFILE_DURATION: ${{ vars.TREEDB_CI_FEDERATION_PROFILE_DURATION }}
          TREEDB_CI_FEDERATION_PROFILE_CONCURRENCY: ${{ vars.TREEDB_CI_FEDERATION_PROFILE_CONCURRENCY }}
          TREEDB_CI_FEDERATION_PROFILE_SIZE: ${{ vars.TREEDB_CI_FEDERATION_PROFILE_SIZE }}
          TREEDB_CI_FEDERATION_PROFILE_ENABLED: ${{ vars.TREEDB_CI_FEDERATION_PROFILE_ENABLED }}
        run: |
          set -euo pipefail

          mkdir -p target/profiles

          if [[ "${TREEDB_CI_FEDERATION_PROFILE_ENABLED:-true}" == "false" ]]; then
            echo "Federation profile disabled by TREEDB_CI_FEDERATION_PROFILE_ENABLED=false"
            exit 0
          fi

          mode="${{ matrix.mode }}"
          export TREEDB_PROFILE_DURATION="${TREEDB_CI_FEDERATION_PROFILE_DURATION:-10m}"
          export TREEDB_PROFILE_MINIMUM_MEASURED_DURATION="${TREEDB_CI_FEDERATION_PROFILE_DURATION:-10m}"
          export TREEDB_PROFILE_DURATION_IS_CONTROLLING="true"
          export TREEDB_PROFILE_ITERATIONS=""
          export TREEDB_PROFILE_CONCURRENCY="${TREEDB_CI_FEDERATION_PROFILE_CONCURRENCY:-25}"
          export TREEDB_PROFILE_SIZE="${TREEDB_CI_FEDERATION_PROFILE_SIZE:-small}"
          export TREEDB_PROFILE_REPORT_FORMAT="both"
          export TREEDB_PROFILE_INCLUDE_FEDERATION="true"
          export TREEDB_PROFILE_OUTPUT="target/profiles/ci-${mode}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}.yaml"
          export TREEDB_PROFILE_MARKDOWN_OUTPUT="target/profiles/ci-${mode}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}.md"
          export TREEDB_PROFILE_REPLAY_LOG="target/profiles/ci-${mode}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}-replay.jsonl"
          export TREEDB_PROFILE_FAILURE_REPLAY_LOG="target/profiles/ci-${mode}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}-failures.jsonl"

          ./scripts/profile-compose.sh "${mode}"

      - name: Capture compose logs
        if: failure()
        shell: bash
        run: |
          mkdir -p target/profiles
          docker compose logs --no-color > "target/profiles/federation-compose-${{ matrix.mode }}-${{ matrix.arch }}.log" 2>&1 || true

      - name: Upload federation profile reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: treedb-federation-profile-${{ matrix.mode }}-${{ matrix.arch }}
          path: |
            target/profiles/ci-*.yaml
            target/profiles/ci-*.md
            target/profiles/ci-*-replay.jsonl
            target/profiles/ci-*-failures.jsonl
            target/profiles/*.log
          if-no-files-found: ignore

  profile-performance:
    needs: verify
    if: >-
      (
        github.event_name == 'workflow_dispatch' &&
        inputs.performance_profile == 'true'
      ) ||
      (
        github.event_name == 'push' &&
        (
          github.ref == 'refs/heads/main' ||
          github.ref == 'refs/heads/staging' ||
          startsWith(github.ref, 'refs/tags/')
        )
      )
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    name: Performance Profile (${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run performance profile
        shell: bash
        env:
          TREEDB_PROFILE_DURATION: ${{ vars.TREEDB_CI_PERFORMANCE_PROFILE_DURATION }}
          TREEDB_PROFILE_CONCURRENCY: ${{ vars.TREEDB_CI_PERFORMANCE_PROFILE_CONCURRENCY }}
          TREEDB_PROFILE_TARGET_PRIMARY_RPS: ${{ vars.TREEDB_CI_PERFORMANCE_TARGET_PRIMARY_RPS }}
          TREEDB_PROFILE_PROBE_SAMPLING_RATE: ${{ vars.TREEDB_CI_PERFORMANCE_PROBE_SAMPLING_RATE }}
          TREEDB_RUNTIME_CPU_BUDGET: ${{ vars.TREEDB_CI_PERFORMANCE_CPU_BUDGET }}
          TREEDB_RUNTIME_MEMORY_BUDGET_MB: ${{ vars.TREEDB_CI_PERFORMANCE_MEMORY_BUDGET_MB }}
        run: |
          set -euo pipefail

          mkdir -p target/profiles
          cat > target/profiles/performance-errors-only-budget.json <<'JSON'
          {
            "maxTotalErrors": 0,
            "maxAssertionFailures": 0,
            "maxOpenApiFailures": 0,
            "maxReconciliationDrift": 0,
            "maxUnverifiedRaces": 0,
            "maxValidationProbeFailures": 0,
            "maxNegativeTestFailures": 0,
            "maxMetamorphicFailures": 0,
            "maxEndpointConsistencyFailures": 0,
            "maxDelayedConsistencyFailures": 0,
            "maxPermissionMatrixFailures": 0,
            "minMeasuredDurationRatio": 0,
            "maxRaceInterferenceRate": 1000000,
            "maxP99MsByCategory": {}
          }
          JSON

          mode="performance"
          export TREEDB_PROFILE_PROFILE_PURPOSE="performance"
          export TREEDB_PROFILE_DURATION="${TREEDB_PROFILE_DURATION:-10m}"
          export TREEDB_PROFILE_MINIMUM_MEASURED_DURATION="${TREEDB_PROFILE_DURATION}"
          export TREEDB_PROFILE_DURATION_IS_CONTROLLING="true"
          export TREEDB_PROFILE_ITERATIONS=""
          export TREEDB_PROFILE_CONCURRENCY="${TREEDB_PROFILE_CONCURRENCY:-150}"
          export TREEDB_PROFILE_TARGET_PRIMARY_RPS="${TREEDB_PROFILE_TARGET_PRIMARY_RPS:-100}"
          export TREEDB_PROFILE_VALIDATION_PROBE_MODE="sampled"
          export TREEDB_PROFILE_PROBE_SAMPLING_RATE="${TREEDB_PROFILE_PROBE_SAMPLING_RATE:-0.10}"
          export TREEDB_RUNTIME_CPU_BUDGET="${TREEDB_RUNTIME_CPU_BUDGET:-4}"
          export TREEDB_RUNTIME_MEMORY_BUDGET_MB="${TREEDB_RUNTIME_MEMORY_BUDGET_MB:-4096}"
          export TREEDB_PROFILE_FAIL_BELOW_PRIMARY_RPS=""
          export TREEDB_PROFILE_RELIABILITY_BUDGET="target/profiles/performance-errors-only-budget.json"
          export TREEDB_PROFILE_REPORT_FORMAT="both"
          export TREEDB_PROFILE_OUTPUT="target/profiles/performance-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}.yaml"
          export TREEDB_PROFILE_MARKDOWN_OUTPUT="target/profiles/performance-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}.md"
          export TREEDB_PROFILE_REPLAY_LOG="target/profiles/performance-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}-replay.jsonl"
          export TREEDB_PROFILE_FAILURE_REPLAY_LOG="target/profiles/performance-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${{ matrix.arch }}-failures.jsonl"

          ./scripts/profile-compose.sh "${mode}"

      - name: Capture compose logs
        if: failure()
        shell: bash
        run: |
          mkdir -p target/profiles
          docker compose logs --no-color > "target/profiles/performance-compose-${{ matrix.arch }}.log" 2>&1 || true

      - name: Upload performance profile reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: treedb-performance-profile-${{ matrix.arch }}
          path: |
            target/profiles/performance-*.yaml
            target/profiles/performance-*.md
            target/profiles/performance-*-replay.jsonl
            target/profiles/performance-*-failures.jsonl
            target/profiles/*.log
          if-no-files-found: ignore

  publish-plan:
    runs-on: ubuntu-latest
    needs: verify
    if: >-
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/'))
    permissions:
      contents: read
    outputs:
      image_tag: ${{ steps.docker_tag.outputs.image_tag }}
      arch_image_prefix: ${{ steps.docker_tag.outputs.arch_image_prefix }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Docker tag
        id: docker_tag
        shell: bash
        run: |
          set -euo pipefail

          semver='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z][0-9A-Za-z.-]*)?$'

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
            if [[ "$tag" == v* ]]; then
              echo "Release tags must be semantic versions without a v prefix." >&2
              exit 1
            fi
            if [[ "$tag" == *+* ]]; then
              echo "Release tags with build metadata cannot be published as exact Docker tags." >&2
              exit 1
            fi
            if [[ ! "$tag" =~ $semver ]]; then
              echo "Release tag '$tag' is not a supported semantic version." >&2
              exit 1
            fi
            if docker buildx imagetools inspect "treeseed/treedb:${tag}" >/dev/null 2>&1; then
              echo "Docker image treeseed/treedb:${tag} already exists." >&2
              exit 1
            fi
            image_tag="treeseed/treedb:${tag}"
          else
            image_tag="treeseed/treedb:latest"
          fi

          echo "image_tag=${image_tag}" >> "$GITHUB_OUTPUT"
          echo "arch_image_prefix=${image_tag}" >> "$GITHUB_OUTPUT"

  build-publish-image:
    needs:
      - publish-plan
      - profile
      - profile-federation
      - profile-performance
    if: >-
      needs.publish-plan.result == 'success' &&
      needs.profile.result == 'success' &&
      needs.profile-federation.result == 'success' &&
      needs.profile-performance.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    environment: production
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push architecture image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: prod
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ needs.publish-plan.outputs.arch_image_prefix }}-${{ matrix.arch }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha,scope=treedb-prod-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=treedb-prod-${{ matrix.arch }}

  publish:
    needs:
      - publish-plan
      - build-publish-image
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read

    steps:
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Publish Docker manifest
        shell: bash
        run: |
          set -euo pipefail

          docker buildx imagetools create \
            -t "${{ needs.publish-plan.outputs.image_tag }}" \
            "${{ needs.publish-plan.outputs.arch_image_prefix }}-amd64" \
            "${{ needs.publish-plan.outputs.arch_image_prefix }}-arm64"

          docker buildx imagetools inspect "${{ needs.publish-plan.outputs.image_tag }}"
