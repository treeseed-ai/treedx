services:
  treedx-node-a:
    environment:
      TREEDX_FEDERATION_MODE: connected_library
  treedx-node-b:
    environment:
      TREEDX_FEDERATION_MODE: connected_library
      TREEDX_FEDERATION_WRITE_PROXY_ENABLED: "false"
  treedx-node-c:
    environment:
      TREEDX_FEDERATION_MODE: connected_library
      TREEDX_FEDERATION_WRITE_PROXY_ENABLED: "false"
  treedx-profiler:
    environment:
      TREEDX_PROFILE_FEDERATION_MODE: connected_library
      TREEDX_PROFILE_LOAD_MODE: portfolio
      TREEDX_PROFILE_SCENARIO: all
      TREEDX_PROFILE_FIXTURE: small-docs
      TREEDX_PROFILE_SIZE: ${TREEDX_PROFILE_SIZE:-small}
      TREEDX_PROFILE_DURATION: ${TREEDX_PROFILE_DURATION:-10m}
      TREEDX_PROFILE_MINIMUM_MEASURED_DURATION: ${TREEDX_PROFILE_MINIMUM_MEASURED_DURATION:-10m}
      TREEDX_PROFILE_CONCURRENCY: ${TREEDX_PROFILE_CONCURRENCY:-25}
      TREEDX_PROFILE_FEDERATION_EXERCISE_PROMOTION: ${TREEDX_PROFILE_FEDERATION_EXERCISE_PROMOTION:-false}
      TREEDX_PROFILE_FEDERATION_EXERCISE_WRITE_PROXY: ${TREEDX_PROFILE_FEDERATION_EXERCISE_WRITE_PROXY:-false}
      TREEDX_PROFILE_FEDERATION_EXERCISE_CONNECTED_DENIALS: ${TREEDX_PROFILE_FEDERATION_EXERCISE_CONNECTED_DENIALS:-true}
