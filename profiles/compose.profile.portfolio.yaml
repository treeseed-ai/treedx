services:
  treedb-profiler:
    environment:
      TREEDB_PROFILE_LOAD_MODE: ${TREEDB_PROFILE_LOAD_MODE:-portfolio}
      TREEDB_PROFILE_FIXTURE: ${TREEDB_PROFILE_FIXTURE:-small-docs}
      TREEDB_PROFILE_SIZE: ${TREEDB_PROFILE_SIZE:-small}
      TREEDB_PROFILE_SCENARIO: ${TREEDB_PROFILE_SCENARIO:-all}
      TREEDB_PROFILE_ITERATIONS: ${TREEDB_PROFILE_ITERATIONS:-100000}
      TREEDB_PROFILE_CONCURRENCY: ${TREEDB_PROFILE_CONCURRENCY:-100}
      TREEDB_PROFILE_DURATION: ${TREEDB_PROFILE_DURATION:-10m}
      TREEDB_PROFILE_PORTFOLIO_INITIAL_REPOS: ${TREEDB_PROFILE_PORTFOLIO_INITIAL_REPOS:-1}
      TREEDB_PROFILE_PORTFOLIO_MAX_REPOS: ${TREEDB_PROFILE_PORTFOLIO_MAX_REPOS:-1000}
      TREEDB_PROFILE_PORTFOLIO_GROWTH_TARGET: ${TREEDB_PROFILE_PORTFOLIO_GROWTH_TARGET:-steady}
      TREEDB_PROFILE_INCLUDE_ADMIN: ${TREEDB_PROFILE_INCLUDE_ADMIN:-true}
      TREEDB_PROFILE_INCLUDE_DESTRUCTIVE: ${TREEDB_PROFILE_INCLUDE_DESTRUCTIVE:-true}
      TREEDB_PROFILE_INCLUDE_EXEC: ${TREEDB_PROFILE_INCLUDE_EXEC:-true}
      TREEDB_PROFILE_INCLUDE_FEDERATION: ${TREEDB_PROFILE_INCLUDE_FEDERATION:-true}
