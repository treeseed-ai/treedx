services:
  treedx-profiler:
    environment:
      TREEDX_PROFILE_LOAD_MODE: ${TREEDX_PROFILE_LOAD_MODE:-random}
      TREEDX_PROFILE_FIXTURE: ${TREEDX_PROFILE_FIXTURE:-medium-mixed}
      TREEDX_PROFILE_SIZE: ${TREEDX_PROFILE_SIZE:-medium}
      TREEDX_PROFILE_SCENARIO: ${TREEDX_PROFILE_SCENARIO:-read_heavy}
      TREEDX_PROFILE_ITERATIONS: ${TREEDX_PROFILE_ITERATIONS:-}
      TREEDX_PROFILE_CONCURRENCY: ${TREEDX_PROFILE_CONCURRENCY:-100}
      TREEDX_PROFILE_DURATION: ${TREEDX_PROFILE_DURATION:-10m}
      TREEDX_PROFILE_INCLUDE_ADMIN: ${TREEDX_PROFILE_INCLUDE_ADMIN:-false}
      TREEDX_PROFILE_INCLUDE_DESTRUCTIVE: ${TREEDX_PROFILE_INCLUDE_DESTRUCTIVE:-false}
      TREEDX_PROFILE_INCLUDE_EXEC: ${TREEDX_PROFILE_INCLUDE_EXEC:-false}
      TREEDX_PROFILE_INCLUDE_FEDERATION: ${TREEDX_PROFILE_INCLUDE_FEDERATION:-true}
