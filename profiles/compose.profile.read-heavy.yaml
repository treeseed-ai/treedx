services:
  treedb-profiler:
    environment:
      TREEDB_PROFILE_LOAD_MODE: ${TREEDB_PROFILE_LOAD_MODE:-random}
      TREEDB_PROFILE_FIXTURE: ${TREEDB_PROFILE_FIXTURE:-medium-mixed}
      TREEDB_PROFILE_SIZE: ${TREEDB_PROFILE_SIZE:-medium}
      TREEDB_PROFILE_SCENARIO: ${TREEDB_PROFILE_SCENARIO:-read_heavy}
      TREEDB_PROFILE_ITERATIONS: ${TREEDB_PROFILE_ITERATIONS:-1000}
      TREEDB_PROFILE_CONCURRENCY: ${TREEDB_PROFILE_CONCURRENCY:-100}
      TREEDB_PROFILE_DURATION: ${TREEDB_PROFILE_DURATION:-10m}
      TREEDB_PROFILE_INCLUDE_ADMIN: ${TREEDB_PROFILE_INCLUDE_ADMIN:-false}
      TREEDB_PROFILE_INCLUDE_DESTRUCTIVE: ${TREEDB_PROFILE_INCLUDE_DESTRUCTIVE:-false}
      TREEDB_PROFILE_INCLUDE_EXEC: ${TREEDB_PROFILE_INCLUDE_EXEC:-false}
      TREEDB_PROFILE_INCLUDE_FEDERATION: ${TREEDB_PROFILE_INCLUDE_FEDERATION:-true}
