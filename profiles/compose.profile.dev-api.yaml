services:
  treedx-api:
    build:
      context: ..
      target: dev
    working_dir: /workspace/treedx/apps/api
    command: sh -lc "mix deps.get && mix phx.server"
    environment:
      MIX_ENV: dev
      MIX_BUILD_PATH: /tmp/treedx-mix-build
      PHX_SERVER: "true"
      PHX_HOST: 0.0.0.0
      PORT: "4000"
      TREEDX_DATA_DIR: /var/lib/treedx
      TREEDX_AUTH_MODE: dev
      TREEDX_REGISTRY_MODE: local
      TREEDX_DEV_HOT_RELOAD: "true"
      TREEDX_EXEC_BACKEND: direct_dev
      TREEDX_AUDIT_ASYNC: "true"
      TREEDX_REPO_DOC_CACHE_ENABLED: "true"
      TREEDX_GRAPH_INDEX_CACHE_ENABLED: "true"
      TREEDX_ARTIFACT_INDEX_ENABLED: "true"
      TREEDX_NODE_ID: node_local
    volumes:
      - ..:/workspace/treedx
      - treedx-data:/var/lib/treedx
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:4000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s
