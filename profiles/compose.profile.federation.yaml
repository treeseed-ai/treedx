services:
  treedb-node-a:
    build:
      context: ..
      target: prod
    mem_limit: ${TREEDB_API_MEMORY_LIMIT:-4g}
    environment:
      ELIXIR_ERL_OPTIONS: "+fnu"
      PHX_SERVER: "true"
      PHX_HOST: 0.0.0.0
      PORT: "4000"
      TREEDB_DATA_DIR: /var/lib/treedb
      TREEDB_AUTH_MODE: dev
      TREEDB_REGISTRY_MODE: local
      TREEDB_NODE_ID: node_a
      TREEDB_FEDERATION_ENABLED: "true"
      TREEDB_FEDERATION_NODE_ID: node_a
      TREEDB_FEDERATION_NODE_BASE_URL: http://treedb-node-a:4000
      TREEDB_FEDERATION_ACCEPT_CHILD_REGISTRATION: "true"
      TREEDB_FEDERATION_WRITE_PROXY_ENABLED: "true"
      TREEDB_FEDERATION_READ_FROM_MIRRORS: "true"
      TREEDB_FEDERATION_MODE: ${TREEDB_PROFILE_FEDERATION_MODE:-mirror_cluster}
      TREEDB_AUDIT_ASYNC: "true"
      TREEDB_REPOSITORY_QUERY_MAX_QUEUE: ${TREEDB_REPOSITORY_QUERY_MAX_QUEUE:-2000}
      TREEDB_WORKSPACE_MUTATION_MAX_QUEUE: ${TREEDB_WORKSPACE_MUTATION_MAX_QUEUE:-1000}
      TREEDB_GRAPH_MAX_QUEUE: ${TREEDB_GRAPH_MAX_QUEUE:-500}
      TREEDB_SNAPSHOT_MAX_QUEUE: ${TREEDB_SNAPSHOT_MAX_QUEUE:-200}
      TREEDB_IMPORT_MAX_QUEUE: ${TREEDB_IMPORT_MAX_QUEUE:-100}
      TREEDB_REPOSITORY_QUERY_QUEUE_TIMEOUT_MS: ${TREEDB_REPOSITORY_QUERY_QUEUE_TIMEOUT_MS:-30000}
      TREEDB_WORKSPACE_MUTATION_QUEUE_TIMEOUT_MS: ${TREEDB_WORKSPACE_MUTATION_QUEUE_TIMEOUT_MS:-30000}
      TREEDB_GRAPH_QUEUE_TIMEOUT_MS: ${TREEDB_GRAPH_QUEUE_TIMEOUT_MS:-45000}
      TREEDB_SNAPSHOT_QUEUE_TIMEOUT_MS: ${TREEDB_SNAPSHOT_QUEUE_TIMEOUT_MS:-60000}
      TREEDB_IMPORT_QUEUE_TIMEOUT_MS: ${TREEDB_IMPORT_QUEUE_TIMEOUT_MS:-60000}
      TREEDB_HEAVY_OPERATION_EXECUTION_TIMEOUT_MS: ${TREEDB_HEAVY_OPERATION_EXECUTION_TIMEOUT_MS:-0}
      TREEDB_FEDERATION_LOAD_AWARE_READS: ${TREEDB_FEDERATION_LOAD_AWARE_READS:-true}
      TREEDB_FEDERATION_LOAD_AWARE_READ_PRESSURE: ${TREEDB_FEDERATION_LOAD_AWARE_READ_PRESSURE:-moderate}
      TREEDB_FEDERATION_REMOTE_LOAD_TTL_MS: ${TREEDB_FEDERATION_REMOTE_LOAD_TTL_MS:-2000}
      TREEDB_FEDERATION_SPILLOVER_MAX_ATTEMPTS: ${TREEDB_FEDERATION_SPILLOVER_MAX_ATTEMPTS:-1}
      SECRET_KEY_BASE: federation_profile_node_a_profile_profile_profile_profile_64
    ports:
      - "${TREEDB_NODE_A_HOST_PORT:-4000}:4000"
    volumes:
      - treedb-node-a-data:/var/lib/treedb
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-qO-", "http://127.0.0.1:4000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  treedb-node-b:
    build:
      context: ..
      target: prod
    mem_limit: ${TREEDB_API_MEMORY_LIMIT:-4g}
    environment:
      ELIXIR_ERL_OPTIONS: "+fnu"
      PHX_SERVER: "true"
      PHX_HOST: 0.0.0.0
      PORT: "4000"
      TREEDB_DATA_DIR: /var/lib/treedb
      TREEDB_AUTH_MODE: dev
      TREEDB_REGISTRY_MODE: local
      TREEDB_NODE_ID: node_b
      TREEDB_FEDERATION_ENABLED: "true"
      TREEDB_FEDERATION_NODE_ID: node_b
      TREEDB_FEDERATION_NODE_BASE_URL: http://treedb-node-b:4000
      TREEDB_FEDERATION_PARENTS: node_a=http://treedb-node-a:4000
      TREEDB_FEDERATION_AUTO_TRUST_PARENTS: "true"
      TREEDB_FEDERATION_WRITE_PROXY_ENABLED: "true"
      TREEDB_FEDERATION_READ_FROM_MIRRORS: "true"
      TREEDB_FEDERATION_MODE: ${TREEDB_PROFILE_FEDERATION_MODE:-mirror_cluster}
      TREEDB_AUDIT_ASYNC: "true"
      TREEDB_REPOSITORY_QUERY_MAX_QUEUE: ${TREEDB_REPOSITORY_QUERY_MAX_QUEUE:-2000}
      TREEDB_WORKSPACE_MUTATION_MAX_QUEUE: ${TREEDB_WORKSPACE_MUTATION_MAX_QUEUE:-1000}
      TREEDB_GRAPH_MAX_QUEUE: ${TREEDB_GRAPH_MAX_QUEUE:-500}
      TREEDB_SNAPSHOT_MAX_QUEUE: ${TREEDB_SNAPSHOT_MAX_QUEUE:-200}
      TREEDB_IMPORT_MAX_QUEUE: ${TREEDB_IMPORT_MAX_QUEUE:-100}
      TREEDB_REPOSITORY_QUERY_QUEUE_TIMEOUT_MS: ${TREEDB_REPOSITORY_QUERY_QUEUE_TIMEOUT_MS:-30000}
      TREEDB_WORKSPACE_MUTATION_QUEUE_TIMEOUT_MS: ${TREEDB_WORKSPACE_MUTATION_QUEUE_TIMEOUT_MS:-30000}
      TREEDB_GRAPH_QUEUE_TIMEOUT_MS: ${TREEDB_GRAPH_QUEUE_TIMEOUT_MS:-45000}
      TREEDB_SNAPSHOT_QUEUE_TIMEOUT_MS: ${TREEDB_SNAPSHOT_QUEUE_TIMEOUT_MS:-60000}
      TREEDB_IMPORT_QUEUE_TIMEOUT_MS: ${TREEDB_IMPORT_QUEUE_TIMEOUT_MS:-60000}
      TREEDB_HEAVY_OPERATION_EXECUTION_TIMEOUT_MS: ${TREEDB_HEAVY_OPERATION_EXECUTION_TIMEOUT_MS:-0}
      TREEDB_FEDERATION_LOAD_AWARE_READS: ${TREEDB_FEDERATION_LOAD_AWARE_READS:-true}
      TREEDB_FEDERATION_LOAD_AWARE_READ_PRESSURE: ${TREEDB_FEDERATION_LOAD_AWARE_READ_PRESSURE:-moderate}
      TREEDB_FEDERATION_REMOTE_LOAD_TTL_MS: ${TREEDB_FEDERATION_REMOTE_LOAD_TTL_MS:-2000}
      TREEDB_FEDERATION_SPILLOVER_MAX_ATTEMPTS: ${TREEDB_FEDERATION_SPILLOVER_MAX_ATTEMPTS:-1}
      SECRET_KEY_BASE: federation_profile_node_b_profile_profile_profile_profile_64
    volumes:
      - treedb-node-b-data:/var/lib/treedb
    depends_on:
      treedb-node-a:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-qO-", "http://127.0.0.1:4000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  treedb-node-c:
    build:
      context: ..
      target: prod
    mem_limit: ${TREEDB_API_MEMORY_LIMIT:-4g}
    environment:
      ELIXIR_ERL_OPTIONS: "+fnu"
      PHX_SERVER: "true"
      PHX_HOST: 0.0.0.0
      PORT: "4000"
      TREEDB_DATA_DIR: /var/lib/treedb
      TREEDB_AUTH_MODE: dev
      TREEDB_REGISTRY_MODE: local
      TREEDB_NODE_ID: node_c
      TREEDB_FEDERATION_ENABLED: "true"
      TREEDB_FEDERATION_NODE_ID: node_c
      TREEDB_FEDERATION_NODE_BASE_URL: http://treedb-node-c:4000
      TREEDB_FEDERATION_PARENTS: node_a=http://treedb-node-a:4000,node_b=http://treedb-node-b:4000
      TREEDB_FEDERATION_AUTO_TRUST_PARENTS: "true"
      TREEDB_FEDERATION_WRITE_PROXY_ENABLED: "true"
      TREEDB_FEDERATION_READ_FROM_MIRRORS: "true"
      TREEDB_FEDERATION_MODE: ${TREEDB_PROFILE_FEDERATION_MODE:-mirror_cluster}
      TREEDB_AUDIT_ASYNC: "true"
      TREEDB_REPOSITORY_QUERY_MAX_QUEUE: ${TREEDB_REPOSITORY_QUERY_MAX_QUEUE:-2000}
      TREEDB_WORKSPACE_MUTATION_MAX_QUEUE: ${TREEDB_WORKSPACE_MUTATION_MAX_QUEUE:-1000}
      TREEDB_GRAPH_MAX_QUEUE: ${TREEDB_GRAPH_MAX_QUEUE:-500}
      TREEDB_SNAPSHOT_MAX_QUEUE: ${TREEDB_SNAPSHOT_MAX_QUEUE:-200}
      TREEDB_IMPORT_MAX_QUEUE: ${TREEDB_IMPORT_MAX_QUEUE:-100}
      TREEDB_REPOSITORY_QUERY_QUEUE_TIMEOUT_MS: ${TREEDB_REPOSITORY_QUERY_QUEUE_TIMEOUT_MS:-30000}
      TREEDB_WORKSPACE_MUTATION_QUEUE_TIMEOUT_MS: ${TREEDB_WORKSPACE_MUTATION_QUEUE_TIMEOUT_MS:-30000}
      TREEDB_GRAPH_QUEUE_TIMEOUT_MS: ${TREEDB_GRAPH_QUEUE_TIMEOUT_MS:-45000}
      TREEDB_SNAPSHOT_QUEUE_TIMEOUT_MS: ${TREEDB_SNAPSHOT_QUEUE_TIMEOUT_MS:-60000}
      TREEDB_IMPORT_QUEUE_TIMEOUT_MS: ${TREEDB_IMPORT_QUEUE_TIMEOUT_MS:-60000}
      TREEDB_HEAVY_OPERATION_EXECUTION_TIMEOUT_MS: ${TREEDB_HEAVY_OPERATION_EXECUTION_TIMEOUT_MS:-0}
      TREEDB_FEDERATION_LOAD_AWARE_READS: ${TREEDB_FEDERATION_LOAD_AWARE_READS:-true}
      TREEDB_FEDERATION_LOAD_AWARE_READ_PRESSURE: ${TREEDB_FEDERATION_LOAD_AWARE_READ_PRESSURE:-moderate}
      TREEDB_FEDERATION_REMOTE_LOAD_TTL_MS: ${TREEDB_FEDERATION_REMOTE_LOAD_TTL_MS:-2000}
      TREEDB_FEDERATION_SPILLOVER_MAX_ATTEMPTS: ${TREEDB_FEDERATION_SPILLOVER_MAX_ATTEMPTS:-1}
      SECRET_KEY_BASE: federation_profile_node_c_profile_profile_profile_profile_64
    volumes:
      - treedb-node-c-data:/var/lib/treedb
    depends_on:
      treedb-node-a:
        condition: service_healthy
      treedb-node-b:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-qO-", "http://127.0.0.1:4000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  treedb-profiler:
    build:
      context: ..
      target: dev
    working_dir: /workspace/treedb
    depends_on:
      treedb-node-a:
        condition: service_healthy
      treedb-node-b:
        condition: service_healthy
      treedb-node-c:
        condition: service_healthy
    environment:
      ELIXIR_ERL_OPTIONS: "+fnu"
      MIX_ENV: dev
      TREEDB_PROFILE_BASE_URL: ${TREEDB_PROFILE_BASE_URL:-http://treedb-node-a:4000}
      TREEDB_PROFILE_LOAD_MODE: ${TREEDB_PROFILE_LOAD_MODE:-portfolio}
      TREEDB_PROFILE_FIXTURE: ${TREEDB_PROFILE_FIXTURE:-small-docs}
      TREEDB_PROFILE_SIZE: ${TREEDB_PROFILE_SIZE:-small}
      TREEDB_PROFILE_SCENARIO: ${TREEDB_PROFILE_SCENARIO:-all}
      TREEDB_PROFILE_ITERATIONS: ${TREEDB_PROFILE_ITERATIONS:-}
      TREEDB_PROFILE_CONCURRENCY: ${TREEDB_PROFILE_CONCURRENCY:-25}
      TREEDB_PROFILE_DURATION: ${TREEDB_PROFILE_DURATION:-10m}
      TREEDB_PROFILE_MINIMUM_MEASURED_DURATION: ${TREEDB_PROFILE_MINIMUM_MEASURED_DURATION:-10m}
      TREEDB_PROFILE_DURATION_IS_CONTROLLING: ${TREEDB_PROFILE_DURATION_IS_CONTROLLING:-true}
      TREEDB_PROFILE_TIMEOUT_MS: ${TREEDB_PROFILE_TIMEOUT_MS:-120000}
      TREEDB_PROFILE_REPORT_FORMAT: ${TREEDB_PROFILE_REPORT_FORMAT:-both}
      TREEDB_PROFILE_OUTPUT: ${TREEDB_PROFILE_OUTPUT:-target/profiles/federation-profile.yaml}
      TREEDB_PROFILE_MARKDOWN_OUTPUT: ${TREEDB_PROFILE_MARKDOWN_OUTPUT:-target/profiles/federation-profile.md}
      TREEDB_PROFILE_REPLAY_LOG: ${TREEDB_PROFILE_REPLAY_LOG:-target/profiles/federation-profile-replay.jsonl}
      TREEDB_PROFILE_FAILURE_REPLAY_LOG: ${TREEDB_PROFILE_FAILURE_REPLAY_LOG:-target/profiles/federation-profile-failures.jsonl}
      TREEDB_PROFILE_REPO_PREFIX: ${TREEDB_PROFILE_REPO_PREFIX:-profile-federation-}
      TREEDB_PROFILE_INCLUDE_ADMIN: ${TREEDB_PROFILE_INCLUDE_ADMIN:-true}
      TREEDB_PROFILE_INCLUDE_DESTRUCTIVE: ${TREEDB_PROFILE_INCLUDE_DESTRUCTIVE:-true}
      TREEDB_PROFILE_INCLUDE_EXEC: ${TREEDB_PROFILE_INCLUDE_EXEC:-true}
      TREEDB_PROFILE_INCLUDE_FEDERATION: ${TREEDB_PROFILE_INCLUDE_FEDERATION:-true}
      TREEDB_PROFILE_RELIABILITY_VERIFIER: ${TREEDB_PROFILE_RELIABILITY_VERIFIER:-true}
      TREEDB_PROFILE_FEDERATION_MODE: ${TREEDB_PROFILE_FEDERATION_MODE:-mirror_cluster}
      TREEDB_PROFILE_FEDERATION_NODE_A_URL: http://treedb-node-a:4000
      TREEDB_PROFILE_FEDERATION_NODE_B_URL: http://treedb-node-b:4000
      TREEDB_PROFILE_FEDERATION_NODE_C_URL: http://treedb-node-c:4000
      TREEDB_PROFILE_FEDERATION_EXERCISE_PROMOTION: ${TREEDB_PROFILE_FEDERATION_EXERCISE_PROMOTION:-true}
      TREEDB_PROFILE_FEDERATION_EXERCISE_WRITE_PROXY: ${TREEDB_PROFILE_FEDERATION_EXERCISE_WRITE_PROXY:-true}
      TREEDB_PROFILE_FEDERATION_EXERCISE_CONNECTED_DENIALS: ${TREEDB_PROFILE_FEDERATION_EXERCISE_CONNECTED_DENIALS:-true}
      TREEDB_PROFILE_PROFILE_PURPOSE: ${TREEDB_PROFILE_PROFILE_PURPOSE:-reliability}
      TREEDB_PROFILE_TARGET_PRIMARY_RPS: ${TREEDB_PROFILE_TARGET_PRIMARY_RPS:-}
      TREEDB_PROFILE_PROBE_SAMPLING_RATE: ${TREEDB_PROFILE_PROBE_SAMPLING_RATE:-}
      TREEDB_PROFILE_VALIDATION_PROBE_MODE: ${TREEDB_PROFILE_VALIDATION_PROBE_MODE:-}
      TREEDB_PROFILE_INCLUDE_PROBE_SAMPLES: ${TREEDB_PROFILE_INCLUDE_PROBE_SAMPLES:-false}
      TREEDB_PROFILE_INCLUDE_TOTAL_THROUGHPUT: ${TREEDB_PROFILE_INCLUDE_TOTAL_THROUGHPUT:-true}
      TREEDB_PROFILE_PERFORMANCE_WORKLOAD: ${TREEDB_PROFILE_PERFORMANCE_WORKLOAD:-balanced}
      TREEDB_PROFILE_HEAVY_OPERATION_RATE: ${TREEDB_PROFILE_HEAVY_OPERATION_RATE:-0.05}
      TREEDB_PROFILE_REPO_GROWTH_RATE: ${TREEDB_PROFILE_REPO_GROWTH_RATE:-0.02}
      TREEDB_PROFILE_SNAPSHOT_RATE: ${TREEDB_PROFILE_SNAPSHOT_RATE:-0.02}
      TREEDB_PROFILE_GRAPH_REFRESH_RATE: ${TREEDB_PROFILE_GRAPH_REFRESH_RATE:-0.03}
      TREEDB_PROFILE_IMPORT_RATE: ${TREEDB_PROFILE_IMPORT_RATE:-0.01}
      TREEDB_PROFILE_FAIL_BELOW_PRIMARY_RPS: ${TREEDB_PROFILE_FAIL_BELOW_PRIMARY_RPS:-}
      TREEDB_PROFILE_FEDERATION_SPILLOVER_PROBE: ${TREEDB_PROFILE_FEDERATION_SPILLOVER_PROBE:-false}
      TREEDB_RUNTIME_CPU_BUDGET: ${TREEDB_RUNTIME_CPU_BUDGET:-}
      TREEDB_RUNTIME_MEMORY_BUDGET_MB: ${TREEDB_RUNTIME_MEMORY_BUDGET_MB:-}
      TREEDB_CACHE_MEMORY_FRACTION: ${TREEDB_CACHE_MEMORY_FRACTION:-}
      TREEDB_PROFILE_HOST_UID: ${TREEDB_PROFILE_HOST_UID:-1000}
      TREEDB_PROFILE_HOST_GID: ${TREEDB_PROFILE_HOST_GID:-1000}
    volumes:
      - ..:/workspace/treedb
      - treedb-node-a-data:/var/lib/treedb
      - treedb-node-b-data:/var/lib/treedb-node-b
      - treedb-node-c-data:/var/lib/treedb-node-c
    command: >
      sh -lc "set +e;
      umask 000;
      set -- ./scripts/profile-treedb.sh --base-url \"$${TREEDB_PROFILE_BASE_URL}\" --auth-mode dev --load-mode \"$${TREEDB_PROFILE_LOAD_MODE}\" --fixture \"$${TREEDB_PROFILE_FIXTURE}\" --size \"$${TREEDB_PROFILE_SIZE}\" --scenario \"$${TREEDB_PROFILE_SCENARIO}\" --concurrency \"$${TREEDB_PROFILE_CONCURRENCY}\" --timeout-ms \"$${TREEDB_PROFILE_TIMEOUT_MS}\" --fixture-root /var/lib/treedb/profiler --repo-prefix \"$${TREEDB_PROFILE_REPO_PREFIX}\" --portfolio-repo-prefix \"$${TREEDB_PROFILE_REPO_PREFIX}\" --report-format \"$${TREEDB_PROFILE_REPORT_FORMAT}\" --markdown-output \"$${TREEDB_PROFILE_MARKDOWN_OUTPUT}\" --include-admin \"$${TREEDB_PROFILE_INCLUDE_ADMIN}\" --include-destructive \"$${TREEDB_PROFILE_INCLUDE_DESTRUCTIVE}\" --include-exec \"$${TREEDB_PROFILE_INCLUDE_EXEC}\" --include-federation \"$${TREEDB_PROFILE_INCLUDE_FEDERATION}\" --reliability-verifier \"$${TREEDB_PROFILE_RELIABILITY_VERIFIER}\" --replay-log \"$${TREEDB_PROFILE_REPLAY_LOG}\" --failure-replay-log \"$${TREEDB_PROFILE_FAILURE_REPLAY_LOG}\" --federation-mode \"$${TREEDB_PROFILE_FEDERATION_MODE}\" --federation-node-a-url \"$${TREEDB_PROFILE_FEDERATION_NODE_A_URL}\" --federation-node-b-url \"$${TREEDB_PROFILE_FEDERATION_NODE_B_URL}\" --federation-node-c-url \"$${TREEDB_PROFILE_FEDERATION_NODE_C_URL}\" --federation-exercise-promotion \"$${TREEDB_PROFILE_FEDERATION_EXERCISE_PROMOTION}\" --federation-exercise-write-proxy \"$${TREEDB_PROFILE_FEDERATION_EXERCISE_WRITE_PROXY}\" --federation-exercise-connected-denials \"$${TREEDB_PROFILE_FEDERATION_EXERCISE_CONNECTED_DENIALS}\" --output \"$${TREEDB_PROFILE_OUTPUT}\";
      set -- \"$$@\" --profile-purpose \"$${TREEDB_PROFILE_PROFILE_PURPOSE}\" --include-probe-samples \"$${TREEDB_PROFILE_INCLUDE_PROBE_SAMPLES}\" --include-total-throughput \"$${TREEDB_PROFILE_INCLUDE_TOTAL_THROUGHPUT}\" --performance-workload \"$${TREEDB_PROFILE_PERFORMANCE_WORKLOAD}\" --heavy-operation-rate \"$${TREEDB_PROFILE_HEAVY_OPERATION_RATE}\" --repo-growth-rate \"$${TREEDB_PROFILE_REPO_GROWTH_RATE}\" --snapshot-rate \"$${TREEDB_PROFILE_SNAPSHOT_RATE}\" --graph-refresh-rate \"$${TREEDB_PROFILE_GRAPH_REFRESH_RATE}\" --import-rate \"$${TREEDB_PROFILE_IMPORT_RATE}\";
      if [ -n \"$${TREEDB_PROFILE_TARGET_PRIMARY_RPS}\" ]; then set -- \"$$@\" --target-primary-rps \"$${TREEDB_PROFILE_TARGET_PRIMARY_RPS}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_PROBE_SAMPLING_RATE}\" ]; then set -- \"$$@\" --probe-sampling-rate \"$${TREEDB_PROFILE_PROBE_SAMPLING_RATE}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_VALIDATION_PROBE_MODE}\" ]; then set -- \"$$@\" --validation-probe-mode \"$${TREEDB_PROFILE_VALIDATION_PROBE_MODE}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_FAIL_BELOW_PRIMARY_RPS}\" ]; then set -- \"$$@\" --fail-below-primary-rps \"$${TREEDB_PROFILE_FAIL_BELOW_PRIMARY_RPS}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_ITERATIONS}\" ]; then set -- \"$$@\" --iterations \"$${TREEDB_PROFILE_ITERATIONS}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_DURATION}\" ]; then set -- \"$$@\" --duration \"$${TREEDB_PROFILE_DURATION}\" --duration-is-controlling \"$${TREEDB_PROFILE_DURATION_IS_CONTROLLING}\" --minimum-measured-duration \"$${TREEDB_PROFILE_MINIMUM_MEASURED_DURATION}\"; fi;
      \"$$@\";
      status=\"$$?\";
      chown -R \"$${TREEDB_PROFILE_HOST_UID}:$${TREEDB_PROFILE_HOST_GID}\" target/profiles 2>/dev/null || true;
      exit \"$$status\""

volumes:
  treedb-node-a-data:
  treedb-node-b-data:
  treedb-node-c-data:
