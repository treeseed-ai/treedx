services:
  treedx-api:
    build:
      context: ..
      target: prod
    mem_limit: ${TREEDX_API_MEMORY_LIMIT:-4g}
    environment:
      ELIXIR_ERL_OPTIONS: "+fnu"
      PHX_SERVER: "true"
      PHX_HOST: 0.0.0.0
      PORT: "4000"
      TREEDX_DATA_DIR: /var/lib/treedx
      TREEDX_AUTH_MODE: dev
      TREEDX_DEV_ACTOR_ID: actor_demo
      TREEDX_DEV_TENANT_ID: tenant_demo
      TREEDX_REGISTRY_MODE: local
      TREEDX_EXEC_BACKEND: direct_dev
      TREEDX_AUDIT_ASYNC: "true"
      TREEDX_REPO_DOC_CACHE_ENABLED: "true"
      TREEDX_GRAPH_INDEX_CACHE_ENABLED: "true"
      TREEDX_ARTIFACT_INDEX_ENABLED: "true"
      TREEDX_RUNTIME_CPU_BUDGET: ${TREEDX_RUNTIME_CPU_BUDGET:-}
      TREEDX_RUNTIME_MEMORY_BUDGET_MB: ${TREEDX_RUNTIME_MEMORY_BUDGET_MB:-}
      TREEDX_CACHE_MEMORY_FRACTION: ${TREEDX_CACHE_MEMORY_FRACTION:-0.25}
      TREEDX_CACHE_MIN_FREE_MEMORY_MB: ${TREEDX_CACHE_MIN_FREE_MEMORY_MB:-512}
      TREEDX_REPO_DOC_CACHE_TTL_MS: ${TREEDX_REPO_DOC_CACHE_TTL_MS:-300000}
      TREEDX_GRAPH_INDEX_CACHE_TTL_MS: ${TREEDX_GRAPH_INDEX_CACHE_TTL_MS:-300000}
      TREEDX_WORKSPACE_WORKER_POOL_SIZE: ${TREEDX_WORKSPACE_WORKER_POOL_SIZE:-}
      TREEDX_REPOSITORY_QUERY_POOL_SIZE: ${TREEDX_REPOSITORY_QUERY_POOL_SIZE:-}
      TREEDX_GRAPH_WORKER_POOL_SIZE: ${TREEDX_GRAPH_WORKER_POOL_SIZE:-}
      TREEDX_SNAPSHOT_WORKER_POOL_SIZE: ${TREEDX_SNAPSHOT_WORKER_POOL_SIZE:-}
      TREEDX_IMPORT_WORKER_POOL_SIZE: ${TREEDX_IMPORT_WORKER_POOL_SIZE:-}
      TREEDX_REPOSITORY_QUERY_MAX_QUEUE: ${TREEDX_REPOSITORY_QUERY_MAX_QUEUE:-2000}
      TREEDX_WORKSPACE_MUTATION_MAX_QUEUE: ${TREEDX_WORKSPACE_MUTATION_MAX_QUEUE:-1000}
      TREEDX_GRAPH_MAX_QUEUE: ${TREEDX_GRAPH_MAX_QUEUE:-500}
      TREEDX_SNAPSHOT_MAX_QUEUE: ${TREEDX_SNAPSHOT_MAX_QUEUE:-200}
      TREEDX_IMPORT_MAX_QUEUE: ${TREEDX_IMPORT_MAX_QUEUE:-100}
      TREEDX_REPOSITORY_QUERY_QUEUE_TIMEOUT_MS: ${TREEDX_REPOSITORY_QUERY_QUEUE_TIMEOUT_MS:-30000}
      TREEDX_WORKSPACE_MUTATION_QUEUE_TIMEOUT_MS: ${TREEDX_WORKSPACE_MUTATION_QUEUE_TIMEOUT_MS:-30000}
      TREEDX_GRAPH_QUEUE_TIMEOUT_MS: ${TREEDX_GRAPH_QUEUE_TIMEOUT_MS:-45000}
      TREEDX_SNAPSHOT_QUEUE_TIMEOUT_MS: ${TREEDX_SNAPSHOT_QUEUE_TIMEOUT_MS:-60000}
      TREEDX_IMPORT_QUEUE_TIMEOUT_MS: ${TREEDX_IMPORT_QUEUE_TIMEOUT_MS:-60000}
      TREEDX_HEAVY_OPERATION_QUEUE_TIMEOUT_MS: ${TREEDX_HEAVY_OPERATION_QUEUE_TIMEOUT_MS:-120000}
      TREEDX_HEAVY_OPERATION_EXECUTION_TIMEOUT_MS: ${TREEDX_HEAVY_OPERATION_EXECUTION_TIMEOUT_MS:-0}
      TREEDX_FEDERATION_LOAD_AWARE_READS: ${TREEDX_FEDERATION_LOAD_AWARE_READS:-true}
      TREEDX_FEDERATION_LOAD_AWARE_READ_PRESSURE: ${TREEDX_FEDERATION_LOAD_AWARE_READ_PRESSURE:-moderate}
      TREEDX_FEDERATION_REMOTE_LOAD_TTL_MS: ${TREEDX_FEDERATION_REMOTE_LOAD_TTL_MS:-2000}
      TREEDX_FEDERATION_SPILLOVER_MAX_ATTEMPTS: ${TREEDX_FEDERATION_SPILLOVER_MAX_ATTEMPTS:-1}
      SECRET_KEY_BASE: profile_profile_profile_profile_profile_profile_profile_profile_64
      TREEDX_NODE_ID: node_local
    ports:
      - "${TREEDX_API_HOST_PORT:-4000}:4000"
    volumes:
      - treedx-data:/var/lib/treedx
    healthcheck:
      test: ["CMD", "/app/bin/treedx_healthcheck"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  treedx-profiler:
    build:
      context: ..
      dockerfile: Dockerfile.profiler
      target: profiler
    working_dir: /workspace/treedx
    depends_on:
      treedx-api:
        condition: service_healthy
    environment:
      TREEDX_PROFILE_BASE_URL: ${TREEDX_PROFILE_BASE_URL:-http://treedx-api:4000}
      TREEDX_PROFILE_LOAD_MODE: ${TREEDX_PROFILE_LOAD_MODE:-portfolio}
      TREEDX_PROFILE_FIXTURE: ${TREEDX_PROFILE_FIXTURE:-small-docs}
      TREEDX_PROFILE_SIZE: ${TREEDX_PROFILE_SIZE:-small}
      TREEDX_PROFILE_SCENARIO: ${TREEDX_PROFILE_SCENARIO:-all}
      TREEDX_PROFILE_ITERATIONS: ${TREEDX_PROFILE_ITERATIONS:-}
      TREEDX_PROFILE_CONCURRENCY: ${TREEDX_PROFILE_CONCURRENCY:-100}
      TREEDX_PROFILE_DURATION: ${TREEDX_PROFILE_DURATION:-10m}
      TREEDX_PROFILE_RELIABILITY_VERIFIER: ${TREEDX_PROFILE_RELIABILITY_VERIFIER:-true}
      TREEDX_PROFILE_DURATION_IS_CONTROLLING: ${TREEDX_PROFILE_DURATION_IS_CONTROLLING:-true}
      TREEDX_PROFILE_MINIMUM_MEASURED_DURATION: ${TREEDX_PROFILE_MINIMUM_MEASURED_DURATION:-10m}
      TREEDX_PROFILE_OPENAPI_RESPONSE_VALIDATION: ${TREEDX_PROFILE_OPENAPI_RESPONSE_VALIDATION:-true}
      TREEDX_PROFILE_MODEL_RECONCILIATION: ${TREEDX_PROFILE_MODEL_RECONCILIATION:-true}
      TREEDX_PROFILE_RECONCILIATION_INTERVAL: ${TREEDX_PROFILE_RECONCILIATION_INTERVAL:-30s}
      TREEDX_PROFILE_RECONCILIATION_SAMPLE_SIZE: ${TREEDX_PROFILE_RECONCILIATION_SAMPLE_SIZE:-100}
      TREEDX_PROFILE_OPERATION_CHAINS: ${TREEDX_PROFILE_OPERATION_CHAINS:-true}
      TREEDX_PROFILE_NEGATIVE_TESTS: ${TREEDX_PROFILE_NEGATIVE_TESTS:-true}
      TREEDX_PROFILE_METAMORPHIC_CHECKS: ${TREEDX_PROFILE_METAMORPHIC_CHECKS:-true}
      TREEDX_PROFILE_DELAYED_CONSISTENCY_CHECKS: ${TREEDX_PROFILE_DELAYED_CONSISTENCY_CHECKS:-true}
      TREEDX_PROFILE_DELAYED_CHECK_INTERVALS: ${TREEDX_PROFILE_DELAYED_CHECK_INTERVALS:-5s,30s}
      TREEDX_PROFILE_RESTART_DURABILITY_CHECK: ${TREEDX_PROFILE_RESTART_DURABILITY_CHECK:-false}
      TREEDX_PROFILE_FAULT_INJECTION: ${TREEDX_PROFILE_FAULT_INJECTION:-false}
      TREEDX_PROFILE_PERMISSION_MATRIX: ${TREEDX_PROFILE_PERMISSION_MATRIX:-true}
      TREEDX_PROFILE_TIMEOUT_MS: ${TREEDX_PROFILE_TIMEOUT_MS:-120000}
      TREEDX_PROFILE_REPORT_FORMAT: ${TREEDX_PROFILE_REPORT_FORMAT:-both}
      TREEDX_PROFILE_OUTPUT: ${TREEDX_PROFILE_OUTPUT:-target/profiles/compose-profile.yaml}
      TREEDX_PROFILE_MARKDOWN_OUTPUT: ${TREEDX_PROFILE_MARKDOWN_OUTPUT:-target/profiles/compose-profile.md}
      TREEDX_PROFILE_REPLAY_LOG: ${TREEDX_PROFILE_REPLAY_LOG:-target/profiles/compose-profile-replay.jsonl}
      TREEDX_PROFILE_FAILURE_REPLAY_LOG: ${TREEDX_PROFILE_FAILURE_REPLAY_LOG:-target/profiles/compose-profile-failures.jsonl}
      TREEDX_PROFILE_REPO_PREFIX: ${TREEDX_PROFILE_REPO_PREFIX:-profile-}
      TREEDX_PROFILE_PORTFOLIO_INITIAL_REPOS: ${TREEDX_PROFILE_PORTFOLIO_INITIAL_REPOS:-1}
      TREEDX_PROFILE_PORTFOLIO_MAX_REPOS: ${TREEDX_PROFILE_PORTFOLIO_MAX_REPOS:-1000}
      TREEDX_PROFILE_PORTFOLIO_GROWTH_TARGET: ${TREEDX_PROFILE_PORTFOLIO_GROWTH_TARGET:-steady}
      TREEDX_PROFILE_PORTFOLIO_MIN_REPO_AGE_BEFORE_DELETE: ${TREEDX_PROFILE_PORTFOLIO_MIN_REPO_AGE_BEFORE_DELETE:-30m}
      TREEDX_PROFILE_INCLUDE_ADMIN: ${TREEDX_PROFILE_INCLUDE_ADMIN:-true}
      TREEDX_PROFILE_INCLUDE_DESTRUCTIVE: ${TREEDX_PROFILE_INCLUDE_DESTRUCTIVE:-true}
      TREEDX_PROFILE_INCLUDE_EXEC: ${TREEDX_PROFILE_INCLUDE_EXEC:-false}
      TREEDX_PROFILE_INCLUDE_FEDERATION: ${TREEDX_PROFILE_INCLUDE_FEDERATION:-true}
      TREEDX_PROFILE_FEDERATION_MODE: ${TREEDX_PROFILE_FEDERATION_MODE:-single_node}
      TREEDX_PROFILE_FEDERATION_NODE_A_URL: ${TREEDX_PROFILE_FEDERATION_NODE_A_URL:-}
      TREEDX_PROFILE_FEDERATION_NODE_B_URL: ${TREEDX_PROFILE_FEDERATION_NODE_B_URL:-}
      TREEDX_PROFILE_FEDERATION_NODE_C_URL: ${TREEDX_PROFILE_FEDERATION_NODE_C_URL:-}
      TREEDX_PROFILE_FEDERATION_EXERCISE_PROMOTION: ${TREEDX_PROFILE_FEDERATION_EXERCISE_PROMOTION:-false}
      TREEDX_PROFILE_FEDERATION_EXERCISE_WRITE_PROXY: ${TREEDX_PROFILE_FEDERATION_EXERCISE_WRITE_PROXY:-false}
      TREEDX_PROFILE_FEDERATION_EXERCISE_CONNECTED_DENIALS: ${TREEDX_PROFILE_FEDERATION_EXERCISE_CONNECTED_DENIALS:-true}
      TREEDX_PROFILE_PROFILE_PURPOSE: ${TREEDX_PROFILE_PROFILE_PURPOSE:-reliability}
      TREEDX_PROFILE_TARGET_PRIMARY_RPS: ${TREEDX_PROFILE_TARGET_PRIMARY_RPS:-}
      TREEDX_PROFILE_PROBE_SAMPLING_RATE: ${TREEDX_PROFILE_PROBE_SAMPLING_RATE:-}
      TREEDX_PROFILE_VALIDATION_PROBE_MODE: ${TREEDX_PROFILE_VALIDATION_PROBE_MODE:-}
      TREEDX_PROFILE_INCLUDE_PROBE_SAMPLES: ${TREEDX_PROFILE_INCLUDE_PROBE_SAMPLES:-false}
      TREEDX_PROFILE_INCLUDE_TOTAL_THROUGHPUT: ${TREEDX_PROFILE_INCLUDE_TOTAL_THROUGHPUT:-true}
      TREEDX_PROFILE_PERFORMANCE_WORKLOAD: ${TREEDX_PROFILE_PERFORMANCE_WORKLOAD:-balanced}
      TREEDX_PROFILE_HEAVY_OPERATION_RATE: ${TREEDX_PROFILE_HEAVY_OPERATION_RATE:-0.05}
      TREEDX_PROFILE_REPO_GROWTH_RATE: ${TREEDX_PROFILE_REPO_GROWTH_RATE:-0.02}
      TREEDX_PROFILE_SNAPSHOT_RATE: ${TREEDX_PROFILE_SNAPSHOT_RATE:-0.02}
      TREEDX_PROFILE_GRAPH_REFRESH_RATE: ${TREEDX_PROFILE_GRAPH_REFRESH_RATE:-0.03}
      TREEDX_PROFILE_IMPORT_RATE: ${TREEDX_PROFILE_IMPORT_RATE:-0.01}
      TREEDX_PROFILE_FAIL_BELOW_PRIMARY_RPS: ${TREEDX_PROFILE_FAIL_BELOW_PRIMARY_RPS:-}
      TREEDX_PROFILE_RELIABILITY_BUDGET: ${TREEDX_PROFILE_RELIABILITY_BUDGET:-}
      TREEDX_PROFILE_HOST_UID: ${TREEDX_PROFILE_HOST_UID:-1000}
      TREEDX_PROFILE_HOST_GID: ${TREEDX_PROFILE_HOST_GID:-1000}
    volumes:
      - ../target/profiles:/workspace/treedx/target/profiles
      - treedx-data:/var/lib/treedx

volumes:
  treedx-data:
