services:
  treedb-api:
    build:
      context: ..
      target: prod
    mem_limit: ${TREEDB_API_MEMORY_LIMIT:-4g}
    environment:
      ELIXIR_ERL_OPTIONS: "+fnu"
      PHX_SERVER: "true"
      PHX_HOST: 0.0.0.0
      PORT: "4000"
      TREEDB_DATA_DIR: /var/lib/treedb
      TREEDB_AUTH_MODE: dev
      TREEDB_REGISTRY_MODE: local
      TREEDB_EXEC_BACKEND: direct_dev
      TREEDB_AUDIT_ASYNC: "true"
      TREEDB_REPO_DOC_CACHE_ENABLED: "true"
      TREEDB_GRAPH_INDEX_CACHE_ENABLED: "true"
      TREEDB_ARTIFACT_INDEX_ENABLED: "true"
      TREEDB_RUNTIME_CPU_BUDGET: ${TREEDB_RUNTIME_CPU_BUDGET:-}
      TREEDB_RUNTIME_MEMORY_BUDGET_MB: ${TREEDB_RUNTIME_MEMORY_BUDGET_MB:-}
      TREEDB_CACHE_MEMORY_FRACTION: ${TREEDB_CACHE_MEMORY_FRACTION:-0.25}
      TREEDB_CACHE_MIN_FREE_MEMORY_MB: ${TREEDB_CACHE_MIN_FREE_MEMORY_MB:-512}
      TREEDB_REPO_DOC_CACHE_TTL_MS: ${TREEDB_REPO_DOC_CACHE_TTL_MS:-300000}
      TREEDB_GRAPH_INDEX_CACHE_TTL_MS: ${TREEDB_GRAPH_INDEX_CACHE_TTL_MS:-300000}
      TREEDB_WORKSPACE_WORKER_POOL_SIZE: ${TREEDB_WORKSPACE_WORKER_POOL_SIZE:-}
      TREEDB_REPOSITORY_QUERY_POOL_SIZE: ${TREEDB_REPOSITORY_QUERY_POOL_SIZE:-}
      TREEDB_GRAPH_WORKER_POOL_SIZE: ${TREEDB_GRAPH_WORKER_POOL_SIZE:-}
      TREEDB_SNAPSHOT_WORKER_POOL_SIZE: ${TREEDB_SNAPSHOT_WORKER_POOL_SIZE:-}
      TREEDB_IMPORT_WORKER_POOL_SIZE: ${TREEDB_IMPORT_WORKER_POOL_SIZE:-}
      TREEDB_REPOSITORY_QUERY_MAX_QUEUE: ${TREEDB_REPOSITORY_QUERY_MAX_QUEUE:-2000}
      TREEDB_WORKSPACE_MUTATION_MAX_QUEUE: ${TREEDB_WORKSPACE_MUTATION_MAX_QUEUE:-1000}
      TREEDB_GRAPH_MAX_QUEUE: ${TREEDB_GRAPH_MAX_QUEUE:-500}
      TREEDB_SNAPSHOT_MAX_QUEUE: ${TREEDB_SNAPSHOT_MAX_QUEUE:-200}
      TREEDB_IMPORT_MAX_QUEUE: ${TREEDB_IMPORT_MAX_QUEUE:-100}
      TREEDB_REPOSITORY_QUERY_QUEUE_TIMEOUT_MS: ${TREEDB_REPOSITORY_QUERY_QUEUE_TIMEOUT_MS:-30000}
      TREEDB_WORKSPACE_MUTATION_QUEUE_TIMEOUT_MS: ${TREEDB_WORKSPACE_MUTATION_QUEUE_TIMEOUT_MS:-30000}
      TREEDB_GRAPH_QUEUE_TIMEOUT_MS: ${TREEDB_GRAPH_QUEUE_TIMEOUT_MS:-45000}
      TREEDB_SNAPSHOT_QUEUE_TIMEOUT_MS: ${TREEDB_SNAPSHOT_QUEUE_TIMEOUT_MS:-60000}
      TREEDB_IMPORT_QUEUE_TIMEOUT_MS: ${TREEDB_IMPORT_QUEUE_TIMEOUT_MS:-60000}
      TREEDB_HEAVY_OPERATION_QUEUE_TIMEOUT_MS: ${TREEDB_HEAVY_OPERATION_QUEUE_TIMEOUT_MS:-120000}
      TREEDB_HEAVY_OPERATION_EXECUTION_TIMEOUT_MS: ${TREEDB_HEAVY_OPERATION_EXECUTION_TIMEOUT_MS:-0}
      TREEDB_FEDERATION_LOAD_AWARE_READS: ${TREEDB_FEDERATION_LOAD_AWARE_READS:-true}
      TREEDB_FEDERATION_LOAD_AWARE_READ_PRESSURE: ${TREEDB_FEDERATION_LOAD_AWARE_READ_PRESSURE:-moderate}
      TREEDB_FEDERATION_REMOTE_LOAD_TTL_MS: ${TREEDB_FEDERATION_REMOTE_LOAD_TTL_MS:-2000}
      TREEDB_FEDERATION_SPILLOVER_MAX_ATTEMPTS: ${TREEDB_FEDERATION_SPILLOVER_MAX_ATTEMPTS:-1}
      SECRET_KEY_BASE: profile_profile_profile_profile_profile_profile_profile_profile_64
      TREEDB_NODE_ID: node_local
    ports:
      - "${TREEDB_API_HOST_PORT:-4000}:4000"
    volumes:
      - treedb-data:/var/lib/treedb
    healthcheck:
      test: ["CMD", "/bin/busybox", "wget", "-qO-", "http://127.0.0.1:4000/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 20s

  treedb-profiler:
    build:
      context: ..
      target: dev
    working_dir: /workspace/treedb
    depends_on:
      treedb-api:
        condition: service_healthy
    environment:
      ELIXIR_ERL_OPTIONS: "+fnu"
      MIX_ENV: dev
      TREEDB_PROFILE_BASE_URL: ${TREEDB_PROFILE_BASE_URL:-http://treedb-api:4000}
      TREEDB_PROFILE_LOAD_MODE: ${TREEDB_PROFILE_LOAD_MODE:-portfolio}
      TREEDB_PROFILE_FIXTURE: ${TREEDB_PROFILE_FIXTURE:-small-docs}
      TREEDB_PROFILE_SIZE: ${TREEDB_PROFILE_SIZE:-small}
      TREEDB_PROFILE_SCENARIO: ${TREEDB_PROFILE_SCENARIO:-all}
      TREEDB_PROFILE_ITERATIONS: ${TREEDB_PROFILE_ITERATIONS:-}
      TREEDB_PROFILE_CONCURRENCY: ${TREEDB_PROFILE_CONCURRENCY:-100}
      TREEDB_PROFILE_DURATION: ${TREEDB_PROFILE_DURATION:-10m}
      TREEDB_PROFILE_RELIABILITY_VERIFIER: ${TREEDB_PROFILE_RELIABILITY_VERIFIER:-true}
      TREEDB_PROFILE_DURATION_IS_CONTROLLING: ${TREEDB_PROFILE_DURATION_IS_CONTROLLING:-true}
      TREEDB_PROFILE_MINIMUM_MEASURED_DURATION: ${TREEDB_PROFILE_MINIMUM_MEASURED_DURATION:-10m}
      TREEDB_PROFILE_OPENAPI_RESPONSE_VALIDATION: ${TREEDB_PROFILE_OPENAPI_RESPONSE_VALIDATION:-true}
      TREEDB_PROFILE_MODEL_RECONCILIATION: ${TREEDB_PROFILE_MODEL_RECONCILIATION:-true}
      TREEDB_PROFILE_RECONCILIATION_INTERVAL: ${TREEDB_PROFILE_RECONCILIATION_INTERVAL:-30s}
      TREEDB_PROFILE_RECONCILIATION_SAMPLE_SIZE: ${TREEDB_PROFILE_RECONCILIATION_SAMPLE_SIZE:-100}
      TREEDB_PROFILE_OPERATION_CHAINS: ${TREEDB_PROFILE_OPERATION_CHAINS:-true}
      TREEDB_PROFILE_NEGATIVE_TESTS: ${TREEDB_PROFILE_NEGATIVE_TESTS:-true}
      TREEDB_PROFILE_METAMORPHIC_CHECKS: ${TREEDB_PROFILE_METAMORPHIC_CHECKS:-true}
      TREEDB_PROFILE_DELAYED_CONSISTENCY_CHECKS: ${TREEDB_PROFILE_DELAYED_CONSISTENCY_CHECKS:-true}
      TREEDB_PROFILE_DELAYED_CHECK_INTERVALS: ${TREEDB_PROFILE_DELAYED_CHECK_INTERVALS:-5s,30s}
      TREEDB_PROFILE_RESTART_DURABILITY_CHECK: ${TREEDB_PROFILE_RESTART_DURABILITY_CHECK:-false}
      TREEDB_PROFILE_FAULT_INJECTION: ${TREEDB_PROFILE_FAULT_INJECTION:-false}
      TREEDB_PROFILE_PERMISSION_MATRIX: ${TREEDB_PROFILE_PERMISSION_MATRIX:-true}
      TREEDB_PROFILE_TIMEOUT_MS: ${TREEDB_PROFILE_TIMEOUT_MS:-120000}
      TREEDB_PROFILE_REPORT_FORMAT: ${TREEDB_PROFILE_REPORT_FORMAT:-both}
      TREEDB_PROFILE_OUTPUT: ${TREEDB_PROFILE_OUTPUT:-target/profiles/compose-profile.yaml}
      TREEDB_PROFILE_MARKDOWN_OUTPUT: ${TREEDB_PROFILE_MARKDOWN_OUTPUT:-target/profiles/compose-profile.md}
      TREEDB_PROFILE_REPLAY_LOG: ${TREEDB_PROFILE_REPLAY_LOG:-target/profiles/compose-profile-replay.jsonl}
      TREEDB_PROFILE_FAILURE_REPLAY_LOG: ${TREEDB_PROFILE_FAILURE_REPLAY_LOG:-target/profiles/compose-profile-failures.jsonl}
      TREEDB_PROFILE_REPO_PREFIX: ${TREEDB_PROFILE_REPO_PREFIX:-profile-}
      TREEDB_PROFILE_PORTFOLIO_INITIAL_REPOS: ${TREEDB_PROFILE_PORTFOLIO_INITIAL_REPOS:-1}
      TREEDB_PROFILE_PORTFOLIO_MAX_REPOS: ${TREEDB_PROFILE_PORTFOLIO_MAX_REPOS:-1000}
      TREEDB_PROFILE_PORTFOLIO_GROWTH_TARGET: ${TREEDB_PROFILE_PORTFOLIO_GROWTH_TARGET:-steady}
      TREEDB_PROFILE_PORTFOLIO_MIN_REPO_AGE_BEFORE_DELETE: ${TREEDB_PROFILE_PORTFOLIO_MIN_REPO_AGE_BEFORE_DELETE:-30m}
      TREEDB_PROFILE_INCLUDE_ADMIN: ${TREEDB_PROFILE_INCLUDE_ADMIN:-true}
      TREEDB_PROFILE_INCLUDE_DESTRUCTIVE: ${TREEDB_PROFILE_INCLUDE_DESTRUCTIVE:-true}
      TREEDB_PROFILE_INCLUDE_EXEC: ${TREEDB_PROFILE_INCLUDE_EXEC:-true}
      TREEDB_PROFILE_INCLUDE_FEDERATION: ${TREEDB_PROFILE_INCLUDE_FEDERATION:-true}
      TREEDB_PROFILE_FEDERATION_MODE: ${TREEDB_PROFILE_FEDERATION_MODE:-single_node}
      TREEDB_PROFILE_FEDERATION_NODE_A_URL: ${TREEDB_PROFILE_FEDERATION_NODE_A_URL:-}
      TREEDB_PROFILE_FEDERATION_NODE_B_URL: ${TREEDB_PROFILE_FEDERATION_NODE_B_URL:-}
      TREEDB_PROFILE_FEDERATION_NODE_C_URL: ${TREEDB_PROFILE_FEDERATION_NODE_C_URL:-}
      TREEDB_PROFILE_FEDERATION_EXERCISE_PROMOTION: ${TREEDB_PROFILE_FEDERATION_EXERCISE_PROMOTION:-false}
      TREEDB_PROFILE_FEDERATION_EXERCISE_WRITE_PROXY: ${TREEDB_PROFILE_FEDERATION_EXERCISE_WRITE_PROXY:-false}
      TREEDB_PROFILE_FEDERATION_EXERCISE_CONNECTED_DENIALS: ${TREEDB_PROFILE_FEDERATION_EXERCISE_CONNECTED_DENIALS:-true}
      TREEDB_PROFILE_PROFILE_PURPOSE: ${TREEDB_PROFILE_PROFILE_PURPOSE:-reliability}
      TREEDB_PROFILE_TARGET_PRIMARY_RPS: ${TREEDB_PROFILE_TARGET_PRIMARY_RPS:-}
      TREEDB_PROFILE_PROBE_SAMPLING_RATE: ${TREEDB_PROFILE_PROBE_SAMPLING_RATE:-}
      TREEDB_PROFILE_VALIDATION_PROBE_MODE: ${TREEDB_PROFILE_VALIDATION_PROBE_MODE:-}
      TREEDB_PROFILE_INCLUDE_PROBE_SAMPLES: ${TREEDB_PROFILE_INCLUDE_PROBE_SAMPLES:-false}
      TREEDB_PROFILE_INCLUDE_TOTAL_THROUGHPUT: ${TREEDB_PROFILE_INCLUDE_TOTAL_THROUGHPUT:-true}
      TREEDB_PROFILE_PERFORMANCE_WORKLOAD: ${TREEDB_PROFILE_PERFORMANCE_WORKLOAD:-balanced}
      TREEDB_PROFILE_HEAVY_OPERATION_RATE: ${TREEDB_PROFILE_HEAVY_OPERATION_RATE:-0.05}
      TREEDB_PROFILE_REPO_GROWTH_RATE: ${TREEDB_PROFILE_REPO_GROWTH_RATE:-0.02}
      TREEDB_PROFILE_SNAPSHOT_RATE: ${TREEDB_PROFILE_SNAPSHOT_RATE:-0.02}
      TREEDB_PROFILE_GRAPH_REFRESH_RATE: ${TREEDB_PROFILE_GRAPH_REFRESH_RATE:-0.03}
      TREEDB_PROFILE_IMPORT_RATE: ${TREEDB_PROFILE_IMPORT_RATE:-0.01}
      TREEDB_PROFILE_FAIL_BELOW_PRIMARY_RPS: ${TREEDB_PROFILE_FAIL_BELOW_PRIMARY_RPS:-}
      TREEDB_PROFILE_HOST_UID: ${TREEDB_PROFILE_HOST_UID:-1000}
      TREEDB_PROFILE_HOST_GID: ${TREEDB_PROFILE_HOST_GID:-1000}
    volumes:
      - ..:/workspace/treedb
      - treedb-data:/var/lib/treedb
    command: >
      sh -lc "set +e;
      umask 000;
      set -- ./scripts/profile-treedb.sh --base-url \"$${TREEDB_PROFILE_BASE_URL}\" --auth-mode dev --load-mode \"$${TREEDB_PROFILE_LOAD_MODE}\" --fixture \"$${TREEDB_PROFILE_FIXTURE}\" --size \"$${TREEDB_PROFILE_SIZE}\" --scenario \"$${TREEDB_PROFILE_SCENARIO}\" --concurrency \"$${TREEDB_PROFILE_CONCURRENCY}\" --timeout-ms \"$${TREEDB_PROFILE_TIMEOUT_MS}\" --fixture-root /var/lib/treedb/profiler --repo-prefix \"$${TREEDB_PROFILE_REPO_PREFIX}\" --portfolio-repo-prefix \"$${TREEDB_PROFILE_REPO_PREFIX}\" --portfolio-initial-repos \"$${TREEDB_PROFILE_PORTFOLIO_INITIAL_REPOS}\" --portfolio-max-repos \"$${TREEDB_PROFILE_PORTFOLIO_MAX_REPOS}\" --portfolio-growth-target \"$${TREEDB_PROFILE_PORTFOLIO_GROWTH_TARGET}\" --portfolio-min-repo-age-before-delete \"$${TREEDB_PROFILE_PORTFOLIO_MIN_REPO_AGE_BEFORE_DELETE}\" --report-format \"$${TREEDB_PROFILE_REPORT_FORMAT}\" --markdown-output \"$${TREEDB_PROFILE_MARKDOWN_OUTPUT}\" --include-admin \"$${TREEDB_PROFILE_INCLUDE_ADMIN}\" --include-destructive \"$${TREEDB_PROFILE_INCLUDE_DESTRUCTIVE}\" --include-exec \"$${TREEDB_PROFILE_INCLUDE_EXEC}\" --include-federation \"$${TREEDB_PROFILE_INCLUDE_FEDERATION}\" --federation-mode \"$${TREEDB_PROFILE_FEDERATION_MODE}\" --federation-exercise-promotion \"$${TREEDB_PROFILE_FEDERATION_EXERCISE_PROMOTION}\" --federation-exercise-write-proxy \"$${TREEDB_PROFILE_FEDERATION_EXERCISE_WRITE_PROXY}\" --federation-exercise-connected-denials \"$${TREEDB_PROFILE_FEDERATION_EXERCISE_CONNECTED_DENIALS}\" --reliability-verifier \"$${TREEDB_PROFILE_RELIABILITY_VERIFIER}\" --openapi-response-validation \"$${TREEDB_PROFILE_OPENAPI_RESPONSE_VALIDATION}\" --model-reconciliation \"$${TREEDB_PROFILE_MODEL_RECONCILIATION}\" --reconciliation-interval \"$${TREEDB_PROFILE_RECONCILIATION_INTERVAL}\" --reconciliation-sample-size \"$${TREEDB_PROFILE_RECONCILIATION_SAMPLE_SIZE}\" --operation-chains \"$${TREEDB_PROFILE_OPERATION_CHAINS}\" --negative-tests \"$${TREEDB_PROFILE_NEGATIVE_TESTS}\" --metamorphic-checks \"$${TREEDB_PROFILE_METAMORPHIC_CHECKS}\" --delayed-consistency-checks \"$${TREEDB_PROFILE_DELAYED_CONSISTENCY_CHECKS}\" --delayed-check-intervals \"$${TREEDB_PROFILE_DELAYED_CHECK_INTERVALS}\" --restart-durability-check \"$${TREEDB_PROFILE_RESTART_DURABILITY_CHECK}\" --fault-injection \"$${TREEDB_PROFILE_FAULT_INJECTION}\" --permission-matrix \"$${TREEDB_PROFILE_PERMISSION_MATRIX}\" --replay-log \"$${TREEDB_PROFILE_REPLAY_LOG}\" --failure-replay-log \"$${TREEDB_PROFILE_FAILURE_REPLAY_LOG}\" --output \"$${TREEDB_PROFILE_OUTPUT}\";
      if [ -n \"$${TREEDB_PROFILE_FEDERATION_NODE_A_URL}\" ]; then set -- \"$$@\" --federation-node-a-url \"$${TREEDB_PROFILE_FEDERATION_NODE_A_URL}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_FEDERATION_NODE_B_URL}\" ]; then set -- \"$$@\" --federation-node-b-url \"$${TREEDB_PROFILE_FEDERATION_NODE_B_URL}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_FEDERATION_NODE_C_URL}\" ]; then set -- \"$$@\" --federation-node-c-url \"$${TREEDB_PROFILE_FEDERATION_NODE_C_URL}\"; fi;
      set -- \"$$@\" --profile-purpose \"$${TREEDB_PROFILE_PROFILE_PURPOSE}\" --include-probe-samples \"$${TREEDB_PROFILE_INCLUDE_PROBE_SAMPLES}\" --include-total-throughput \"$${TREEDB_PROFILE_INCLUDE_TOTAL_THROUGHPUT}\" --performance-workload \"$${TREEDB_PROFILE_PERFORMANCE_WORKLOAD}\" --heavy-operation-rate \"$${TREEDB_PROFILE_HEAVY_OPERATION_RATE}\" --repo-growth-rate \"$${TREEDB_PROFILE_REPO_GROWTH_RATE}\" --snapshot-rate \"$${TREEDB_PROFILE_SNAPSHOT_RATE}\" --graph-refresh-rate \"$${TREEDB_PROFILE_GRAPH_REFRESH_RATE}\" --import-rate \"$${TREEDB_PROFILE_IMPORT_RATE}\";
      if [ -n \"$${TREEDB_PROFILE_TARGET_PRIMARY_RPS}\" ]; then set -- \"$$@\" --target-primary-rps \"$${TREEDB_PROFILE_TARGET_PRIMARY_RPS}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_PROBE_SAMPLING_RATE}\" ]; then set -- \"$$@\" --probe-sampling-rate \"$${TREEDB_PROFILE_PROBE_SAMPLING_RATE}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_VALIDATION_PROBE_MODE}\" ]; then set -- \"$$@\" --validation-probe-mode \"$${TREEDB_PROFILE_VALIDATION_PROBE_MODE}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_FAIL_BELOW_PRIMARY_RPS}\" ]; then set -- \"$$@\" --fail-below-primary-rps \"$${TREEDB_PROFILE_FAIL_BELOW_PRIMARY_RPS}\"; fi;
      if [ -n \"$${TREEDB_PROFILE_ITERATIONS}\" ]; then
        set -- \"$$@\" --iterations \"$${TREEDB_PROFILE_ITERATIONS}\";
      fi;
      if [ -n \"$${TREEDB_PROFILE_DURATION}\" ]; then
        set -- \"$$@\" --duration \"$${TREEDB_PROFILE_DURATION}\" --duration-is-controlling \"$${TREEDB_PROFILE_DURATION_IS_CONTROLLING}\" --minimum-measured-duration \"$${TREEDB_PROFILE_MINIMUM_MEASURED_DURATION}\";
      fi;
      \"$$@\";
      status=\"$$?\";
      chown -R \"$${TREEDB_PROFILE_HOST_UID}:$${TREEDB_PROFILE_HOST_GID}\" target/profiles 2>/dev/null || true;
      exit \"$$status\""

volumes:
  treedb-data:
