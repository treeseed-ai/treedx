services:
  treedx-profiler:
    environment:
      TREEDX_PROFILE_LOAD_MODE: ${TREEDX_PROFILE_LOAD_MODE:-scenario}
      TREEDX_PROFILE_FIXTURE: ${TREEDX_PROFILE_FIXTURE:-all}
      TREEDX_PROFILE_SIZE: ${TREEDX_PROFILE_SIZE:-small}
      TREEDX_PROFILE_SCENARIO: ${TREEDX_PROFILE_SCENARIO:-all}
      TREEDX_PROFILE_ITERATIONS: ${TREEDX_PROFILE_ITERATIONS:-100}
      TREEDX_PROFILE_CONCURRENCY: ${TREEDX_PROFILE_CONCURRENCY:-16}
      TREEDX_PROFILE_DURATION: ${TREEDX_PROFILE_DURATION:-}
      TREEDX_PROFILE_INCLUDE_ADMIN: ${TREEDX_PROFILE_INCLUDE_ADMIN:-true}
      TREEDX_PROFILE_INCLUDE_DESTRUCTIVE: ${TREEDX_PROFILE_INCLUDE_DESTRUCTIVE:-true}
      TREEDX_PROFILE_INCLUDE_EXEC: ${TREEDX_PROFILE_INCLUDE_EXEC:-false}
      TREEDX_PROFILE_INCLUDE_FEDERATION: ${TREEDX_PROFILE_INCLUDE_FEDERATION:-true}
