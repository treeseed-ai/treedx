services:
  treedx-profiler:
    environment:
      TREEDX_PROFILE_LOAD_MODE: ${TREEDX_PROFILE_LOAD_MODE:-scenario}
      TREEDX_PROFILE_FIXTURE: ${TREEDX_PROFILE_FIXTURE:-small-docs}
      TREEDX_PROFILE_SIZE: ${TREEDX_PROFILE_SIZE:-small}
      TREEDX_PROFILE_SCENARIO: ${TREEDX_PROFILE_SCENARIO:-full_api}
      TREEDX_PROFILE_ITERATIONS: ${TREEDX_PROFILE_ITERATIONS:-1}
      TREEDX_PROFILE_CONCURRENCY: ${TREEDX_PROFILE_CONCURRENCY:-1}
      TREEDX_PROFILE_DURATION: ${TREEDX_PROFILE_DURATION:-}
      TREEDX_PROFILE_INCLUDE_ADMIN: ${TREEDX_PROFILE_INCLUDE_ADMIN:-false}
      TREEDX_PROFILE_INCLUDE_DESTRUCTIVE: ${TREEDX_PROFILE_INCLUDE_DESTRUCTIVE:-false}
      TREEDX_PROFILE_INCLUDE_EXEC: ${TREEDX_PROFILE_INCLUDE_EXEC:-false}
      TREEDX_PROFILE_INCLUDE_FEDERATION: ${TREEDX_PROFILE_INCLUDE_FEDERATION:-false}
