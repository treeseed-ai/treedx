services:
  treedb-profiler:
    environment:
      TREEDB_PROFILE_LOAD_MODE: ${TREEDB_PROFILE_LOAD_MODE:-scenario}
      TREEDB_PROFILE_FIXTURE: ${TREEDB_PROFILE_FIXTURE:-small-docs}
      TREEDB_PROFILE_SIZE: ${TREEDB_PROFILE_SIZE:-small}
      TREEDB_PROFILE_SCENARIO: ${TREEDB_PROFILE_SCENARIO:-full_api}
      TREEDB_PROFILE_ITERATIONS: ${TREEDB_PROFILE_ITERATIONS:-1}
      TREEDB_PROFILE_CONCURRENCY: ${TREEDB_PROFILE_CONCURRENCY:-1}
      TREEDB_PROFILE_DURATION: ${TREEDB_PROFILE_DURATION:-}
      TREEDB_PROFILE_INCLUDE_ADMIN: ${TREEDB_PROFILE_INCLUDE_ADMIN:-false}
      TREEDB_PROFILE_INCLUDE_DESTRUCTIVE: ${TREEDB_PROFILE_INCLUDE_DESTRUCTIVE:-false}
      TREEDB_PROFILE_INCLUDE_EXEC: ${TREEDB_PROFILE_INCLUDE_EXEC:-false}
      TREEDB_PROFILE_INCLUDE_FEDERATION: ${TREEDB_PROFILE_INCLUDE_FEDERATION:-false}
